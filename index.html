<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>前期時間割</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg-1: #eef7ee;
  --bg-2: #dfeedd;
  --card: rgba(255,255,255,0.74);
  --line: #d4e4d0;
  --text: #2f4330;

  --forest-1: #6ea56d;
  --forest-2: #4f7f51;
  --forest-3: #355d39;

  --today: #e2f3dc;
  --now: #5f8f57;
  --now-text: #ffffff;

  --time-bg: #edf5ea;
  --head-bg: #f3faf1;
  --title-bg: #dcefd7;

  --lunch-main: #eef6c8;
  --lunch-merge: #ffffff;

  --pill-bg: #ffffff;
  --pill-line: #d6e4d2;
  --pill-shadow: 0 4px 10px rgba(53, 94, 59, 0.08);

  --shadow-lg: 0 16px 40px rgba(43, 75, 47, 0.16);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(126, 179, 118, 0.20), transparent 28%),
    radial-gradient(circle at top right, rgba(95, 143, 87, 0.14), transparent 22%),
    linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
}

.app {
  max-width: 1100px;
  margin: 18px auto;
  padding: 12px;
}

.app-shell {
  background: var(--card);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.5);
  border-radius: 24px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}

.hero {
  padding: 18px 18px 14px;
  background: linear-gradient(135deg, rgba(110,165,109,0.95) 0%, rgba(79,127,81,0.95) 100%);
  color: #fff;
}

.hero-top {
  display: flex;
  align-items: center;
  gap: 10px;
}

.hero-badge {
  width: 38px;
  height: 38px;
  border-radius: 999px;
  background: rgba(255,255,255,0.18);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.hero-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.04em;
}

.hero-sub {
  margin-top: 6px;
  font-size: 12px;
  opacity: 0.9;
}

.table-wrap {
  padding: 12px;
  overflow-x: auto;
  overflow-y: hidden;
  scroll-behavior: smooth;
}

.table-wrap::-webkit-scrollbar {
  height: 10px;
}
.table-wrap::-webkit-scrollbar-track {
  background: rgba(110,165,109,0.10);
  border-radius: 999px;
}
.table-wrap::-webkit-scrollbar-thumb {
  background: rgba(95,143,87,0.45);
  border-radius: 999px;
}

table {
  border-collapse: separate;
  border-spacing: 0;
  table-layout: fixed;
  min-width: 820px;
  background: transparent;
  transform-origin: top left;
}

th, td {
  width: 120px;
  height: 54px;
  text-align: center;
  vertical-align: middle;
  padding: 0;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  background: rgba(255,255,255,0.86);
  white-space: nowrap;
  font-size: 14px;
}

/* 左端 */
.corner,
.time-col,
.lunch-time {
  width: 92px;
  min-width: 92px;
  background: var(--time-bg);
  position: sticky;
  left: 0;
  z-index: 4;
  color: var(--forest-3);
  font-weight: 700;
}

.corner {
  z-index: 6;
  white-space: pre-line;
  border-left: 1px solid var(--line);
}

.time-col {
  white-space: pre-line;
  line-height: 1.15;
  border-left: 1px solid var(--line);
}

.day-head {
  background: var(--head-bg);
  position: sticky;
  top: 54px;
  z-index: 3;
  font-weight: 700;
  color: var(--forest-3);
}

/* タイトル行 */
.title-row th {
  background: var(--title-bg);
  color: var(--forest-3);
  border-left: none;
  border-right: none;
  font-weight: 700;
  height: 54px;
}

.title-main {
  font-size: 18px;
  letter-spacing: 0.08em;
}

/* 今日の列 */
.today {
  background: var(--today) !important;
}

/* 通常セルの中身をカプセル化 */
.class-cell {
  padding: 6px;
}

.lesson-pill {
  min-height: 34px;
  padding: 6px 8px;
  border-radius: 999px;
  background: var(--pill-bg);
  border: 1px solid var(--pill-line);
  box-shadow: var(--pill-shadow);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  line-height: 1.2;
  width: calc(100% - 8px);
  margin: 0 auto;
}

/* 今日の列のカプセル */
.today .lesson-pill {
  background: #f7fff4;
}

/* 今の授業 */
.now {
  background: var(--today) !important;
}

.now .lesson-pill {
  background: var(--now);
  color: var(--now-text);
  border-color: #4d7a48;
  box-shadow: 0 6px 14px rgba(53, 94, 59, 0.24);
  font-weight: 700;
}

/* 昼休み */
.lunch-time {
  z-index: 4;
}

.lunch-main {
  background: var(--lunch-main);
  font-weight: 700;
  color: #586437;
}

.lunch-merge {
  background: var(--lunch-merge);
}

/* 角丸感 */
table tr:first-child th:first-child {
  border-top-left-radius: 16px;
}
table tr:first-child th:last-child {
  border-top-right-radius: 16px;
}
table tr:last-child th.time-col,
table tr:last-child th.lunch-time {
  border-bottom-left-radius: 16px;
}
table tr:last-child td:last-child {
  border-bottom-right-radius: 16px;
}

table tr:first-child th {
  border-top: 1px solid var(--line);
}
table tr td:first-of-type,
table tr th:first-of-type {
  border-left: 1px solid var(--line);
}

/* スマホ調整 */
@media screen and (max-width: 600px) {
  .app {
    margin: 4px auto;
    padding: 4px;
  }

  .app-shell {
    border-radius: 16px;
  }

  .hero {
    padding: 10px 10px 8px;
  }

  .hero-title {
    font-size: 15px;
  }

  .hero-sub {
    font-size: 10px;
  }

  .table-wrap {
    padding: 6px;
  }

  th, td {
    width: 60px;
    height: 40px;
    font-size: 9px;
  }

  .corner,
  .time-col,
  .lunch-time {
    width: 44px;
    min-width: 44px;
    font-size: 9px;
  }

  .day-head {
    top: 40px;
    font-size: 10px;
  }

  .title-row th {
    height: 40px;
  }

  .title-main {
    font-size: 11px;
  }

  .class-cell {
    padding: 1px;
  }

  .lesson-pill {
    min-height: 20px;
    padding: 2px 3px;
    font-size: 8px;
    width: calc(100% - 2px);
  }
}
</style>
</head>

<body>

<div class="app">
  <div class="app-shell">

    <div class="hero">
      <div class="hero-top">
        <div class="hero-badge">🌿</div>
        <div class="hero-title">2026年度 前期時間割</div>
      </div>
      <div class="hero-sub">宇根　花美</div>
    </div>

    <div class="table-wrap wrap">
      <table id="timetable"></table>
    </div>

  </div>
</div>

<script>
const days = ["月","火","水","木","金","土"];

const rows = [
  { type: "class", time: "1限\n8:30",  key: 0 },
  { type: "class", time: "2限\n10:30", key: 1 },
  { type: "class", time: "3限\n12:50", key: 2 },
  { type: "lunch", time: "昼休み", label: "12:50〜14:30" },
  { type: "class", time: "4限\n16:10", key: 3 },
  { type: "class", time: "5限\n17:50", key: 4 },
  { type: "class", time: "6限\n19:30", key: 5 }
];

const timetable = {
  "月": ["教職", "", "日本史", "総合", "", ""],
  "火": ["教育", "世界史", "外書", "", "アジア史", ""],
  "水": ["", "地理", "人文", "", "", ""],
  "木": ["特別", "地誌", "史学展開", "", "日本時代", "ICT教育"],
  "金": ["", "", "", "", "", ""],
  "土": ["教育", "", "", "", "", ""]
};

const todayIndex = new Date().getDay();
const dayMap = ["日","月","火","水","木","金","土"];
const today = dayMap[todayIndex];
const todayIndexInWeek = Math.max(0, days.indexOf(today));

function getCurrentClassIndex() {
  const now = new Date();
  const minutes = now.getHours() * 60 + now.getMinutes();

  const ranges = [
    [8 * 60 + 30, 10 * 60 + 29],
    [10 * 60 + 30, 12 * 60 + 29],
    [12 * 60 + 50, 14 * 60 + 29],
    [16 * 60 + 10, 17 * 60 + 49],
    [17 * 60 + 50, 19 * 60 + 29],
    [19 * 60 + 30, 21 * 60 + 0]
  ];

  for (let i = 0; i < ranges.length; i++) {
    if (minutes >= ranges[i][0] && minutes <= ranges[i][1]) {
      return i;
    }
  }
  return -1;
}

const nowIndex = getCurrentClassIndex();
const table = document.getElementById("timetable");

/* タイトル行 */
const titleTr = document.createElement("tr");
titleTr.className = "title-row";

const titleTh = document.createElement("th");
titleTh.className = "corner";
titleTh.textContent = "開始\n時刻";
titleTr.appendChild(titleTh);

for (let i = 0; i < todayIndexInWeek; i++) {
  const empty = document.createElement("th");
  empty.textContent = "";
  titleTr.appendChild(empty);
}

const titleMain = document.createElement("th");
titleMain.className = "lunch-main title-main";
titleMain.textContent = "今日の授業";
titleMain.style.textAlign = "center";
titleTr.appendChild(titleMain);

const titleRemain = 5 - todayIndexInWeek;
if (titleRemain > 0) {
  const titleMerged = document.createElement("th");
  titleMerged.className = "lunch-merge";
  titleMerged.colSpan = titleRemain;
  titleMerged.textContent = "";
  titleTr.appendChild(titleMerged);
}

table.appendChild(titleTr);

/* 曜日ヘッダー */
const headerTr = document.createElement("tr");

const corner = document.createElement("th");
corner.className = "corner";
corner.textContent = "";
headerTr.appendChild(corner);

days.forEach(day => {
  const th = document.createElement("th");
  th.className = "day-head";
  if (day === today) th.classList.add("today");
  th.textContent = day;
  headerTr.appendChild(th);
});

table.appendChild(headerTr);

/* 本体 */
rows.forEach(row => {
  const tr = document.createElement("tr");

  if (row.type === "lunch") {
    const th = document.createElement("th");
    th.className = "lunch-time";
    th.textContent = row.time;
    tr.appendChild(th);

    for (let i = 0; i < todayIndexInWeek; i++) {
      const empty = document.createElement("td");
      empty.textContent = "";
      tr.appendChild(empty);
    }

    const main = document.createElement("td");
    main.className = "lunch-main";
    main.textContent = row.label;
    tr.appendChild(main);

    const remain = 5 - todayIndexInWeek;
    if (remain > 0) {
      const merged = document.createElement("td");
      merged.className = "lunch-merge";
      merged.colSpan = remain;
      merged.textContent = "";
      tr.appendChild(merged);
    }

    table.appendChild(tr);
    return;
  }

  const th = document.createElement("th");
  th.className = "time-col";
  th.textContent = row.time;
  tr.appendChild(th);

  days.forEach(day => {
    const td = document.createElement("td");
    td.className = "class-cell";

    if (day === today) td.classList.add("today");
    if (day === today && row.key === nowIndex) td.classList.add("now");

    const text = timetable[day][row.key] || "";
    if (text) {
      const pill = document.createElement("div");
      pill.className = "lesson-pill";
      pill.textContent = text;
      td.appendChild(pill);
    }

    tr.appendChild(td);
  });

  table.appendChild(tr);
});

/* 縦表示：今日を左から2列目くらいに置く
   横表示：左から表示 */
function centerTodayIfPortrait() {
  const wrap = document.querySelector(".wrap");
  const headers = document.querySelectorAll(".day-head");
  const todayHeader = headers[todayIndexInWeek];
  if (!wrap || !todayHeader) return;

  if (window.innerHeight > window.innerWidth) {
    const wrapRect = wrap.getBoundingClientRect();
    const cellRect = todayHeader.getBoundingClientRect();

    const targetScroll =
      wrap.scrollLeft +
      (cellRect.left - wrapRect.left) -
      cellRect.width;

    wrap.scrollLeft = Math.max(0, targetScroll);
  } else {
    wrap.scrollLeft = 0;
  }
}

/* 横表示：全体が入るように縮小 */
function fitLandscape() {
  const wrap = document.querySelector(".wrap");
  const table = document.getElementById("timetable");
  if (!wrap || !table) return;

  table.style.transform = "none";
  table.style.transformOrigin = "top left";

  if (window.innerHeight > window.innerWidth) return;

  const availableWidth = wrap.clientWidth;
  const fullWidth = table.scrollWidth;

  let scale = availableWidth / fullWidth;
  if (scale > 1) scale = 1;
  if (scale < 0.72) scale = 0.72;

  table.style.transform = "scale(" + scale + ")";
}

/* Safari対策込み */
function applyLayout() {
  fitLandscape();

  requestAnimationFrame(() => {
    centerTodayIfPortrait();

    setTimeout(() => {
      fitLandscape();
      centerTodayIfPortrait();
    }, 120);
  });
}

window.addEventListener("load", applyLayout);
window.addEventListener("resize", applyLayout);
window.addEventListener("orientationchange", () => {
  setTimeout(applyLayout, 120);
});
</script>

</body>
</html>
