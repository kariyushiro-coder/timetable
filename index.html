<style>
body {
  margin: 0;
  font-family: sans-serif;
}

/* 全体 */
.wrapper {
  display: flex;
}

/* 左（時間）固定 */
.time-column {
  background: #eee;
  position: sticky;
  left: 0;
  z-index: 10;
}

.time-cell {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #ddd;
  min-width: 80px;
}

/* 右（横スクロール） */
.scroll-area {
  overflow-x: auto;
  display: flex;
}

/* 各曜日列 */
.day-column {
  min-width: 120px;
}

/* 曜日ヘッダー */
.day-title {
  text-align: center;
  font-weight: bold;
  background: #f5f5f5;
  border: 1px solid #ddd;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* セル */
.cell {
  height: 50px;
  border: 1px solid #ddd;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 今日ハイライト */
.today {
  background: #ffe0b2;
  border: 2px solid #ff9800;
}

/* 昼休み */
.lunch {
  background: #fff9c4;
  font-weight: bold;
}
</style>

<div class="wrapper">

  <!-- 左：時間 -->
  <div class="time-column" id="time"></div>

  <!-- 右：曜日 -->
  <div class="scroll-area" id="days"></div>

</div>

<script>
const times = [
  "08:50",
  "10:30",
  "12:50",
  "16:10",
  "17:50",
  "19:30"
];

const timetable = {
  "月": ["教職","","日本史","総合","",""],
  "火": ["教育","世界史","外書","","","アジア史"],
  "水": ["","地理","人文","","",""],
  "木": ["特別","地誌","史学展開","","","ICT教育"],
  "金": ["","","","","",""],
  "土": ["教育と社会","","","","",""]
};

/* 時間列 */
const timeDiv = document.getElementById("time");
times.forEach(t => {
  const div = document.createElement("div");
  div.className = "time-cell";
  div.innerText = t;
  timeDiv.appendChild(div);
});

/* 曜日列 */
const daysDiv = document.getElementById("days");

for (const day in timetable) {

  const col = document.createElement("div");
  col.className = "day-column";

  const title = document.createElement("div");
  title.className = "day-title";
  title.innerText = day;
  col.appendChild(title);

  timetable[day].forEach(text => {
    const div = document.createElement("div");
    div.className = "cell";
    div.innerText = text;
    col.appendChild(div);
  });

  daysDiv.appendChild(col);
}
</script>
