<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --forest-bg: #eef6ee;
  --forest-card: #f9fdf8;
  --forest-main: #5f8f57;
  --forest-deep: #355e3b;
  --forest-light: #dcefd8;
  --forest-accent: #9fcd8f;
  --forest-line: #c8ddc3;
  --forest-today: #dff3d8;
  --forest-now: #7aa86f;
  --forest-now-text: #ffffff;
  --forest-title: #e8f5e4;
  --shadow: 0 6px 18px rgba(53, 94, 59, 0.12);
}

body {
  margin: 0;
  font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
  background:
    linear-gradient(180deg, #f4faf3 0%, #eaf4e8 100%);
  color: #2f3b2f;
}

.app-shell {
  max-width: 1000px;
  margin: 18px auto;
  padding: 12px;
}

.app-card {
  background: var(--forest-card);
  border: 1px solid var(--forest-line);
  border-radius: 22px;
  box-shadow: var(--shadow);
  overflow: hidden;
}

.app-header {
  padding: 16px 18px;
  background: linear-gradient(135deg, #6fa56a 0%, #4f7f49 100%);
  color: #fff;
}

.app-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.04em;
}

.app-subtitle {
  font-size: 12px;
  opacity: 0.9;
  margin-top: 4px;
}

/* 横スクロール */
.wrap {
  overflow-x: auto;
  overflow-y: hidden;
  background: linear-gradient(180deg, #f8fcf7 0%, #f2f8f0 100%);
  padding: 10px;
}

/* スクロールバー少しだけ整える */
.wrap::-webkit-scrollbar {
  height: 10px;
}
.wrap::-webkit-scrollbar-track {
  background: #e7f0e4;
  border-radius: 999px;
}
.wrap::-webkit-scrollbar-thumb {
  background: #a8c9a0;
  border-radius: 999px;
}

/* テーブル */
table {
  border-collapse: separate;
  border-spacing: 0;
  table-layout: fixed;
  min-width: 800px;
  background: transparent;
}

th, td {
  border-right: 1px solid var(--forest-line);
  border-bottom: 1px solid var(--forest-line);
  width: 120px;
  height: 56px;
  text-align: center;
  vertical-align: middle;
  padding: 0;
  box-sizing: border-box;
  background: rgba(255,255,255,0.88);
  white-space: nowrap;
  font-size: 14px;
}

/* 外枠の角丸感を出す */
table tr:first-child th:first-child {
  border-top-left-radius: 16px;
}
table tr:first-child th:last-child {
  border-top-right-radius: 16px;
}

/* 左上 */
.corner {
  width: 92px;
  min-width: 92px;
  background: linear-gradient(180deg, #edf5ea 0%, #e0eddc 100%);
  position: sticky;
  left: 0;
  z-index: 5;
  border-left: 1px solid var(--forest-line);
  border-top: 1px solid var(--forest-line);
  font-weight: 700;
  color: var(--forest-deep);
  white-space: pre-line;
}

/* 時間列 */
.time-col {
  width: 92px;
  min-width: 92px;
  background: linear-gradient(180deg, #eef6ec 0%, #e4efe1 100%);
  position: sticky;
  left: 0;
  z-index: 4;
  border-left: 1px solid var(--forest-line);
  font-weight: 700;
  color: var(--forest-deep);
  white-space: pre-line;
  line-height: 1.2;
}

/* 曜日ヘッダー */
.day-head {
  background: linear-gradient(180deg, #f5fbf3 0%, #eaf5e7 100%);
  font-weight: 700;
  position: sticky;
  top: 56px;
  z-index: 3;
  border-top: 1px solid var(--forest-line);
  color: var(--forest-deep);
}

/* タイトル行 */
.title-row th {
  background: linear-gradient(180deg, #e4f3df 0%, #d6ebd0 100%);
  border-left: none;
  border-right: none;
  font-weight: 700;
  color: var(--forest-deep);
  height: 56px;
}

.title-main {
  font-size: 18px;
  letter-spacing: 0.08em;
}

/* 今日 */
.today {
  background: var(--forest-today) !important;
}

/* 今の授業 */
.now {
  background: var(--forest-now) !important;
  color: var(--forest-now-text);
  box-shadow: inset 0 0 0 2px #4b7a45;
  font-weight: 700;
}

/* 昼休み左 */
.lunch-time {
  width: 92px;
  min-width: 92px;
  background: linear-gradient(180deg, #eef6ec 0%, #e4efe1 100%);
  position: sticky;
  left: 0;
  z-index: 4;
  font-weight: 700;
  color: var(--forest-deep);
  border-left: 1px solid var(--forest-line);
}

/* 昼休み右 */
.lunch-main {
  background: linear-gradient(180deg, #f3f9cf 0%, #eaf3bf 100%);
  font-weight: 700;
  color: #55622f;
}

.lunch-merge {
  background: rgba(255,255,255,0.95);
}

/* 角丸っぽく見せる余白 */
tbody tr:last-child th.time-col,
tbody tr:last-child th.lunch-time {
  border-bottom-left-radius: 16px;
}

/* スマホ */
@media screen and (max-width: 600px) {
  .app-shell {
    padding: 8px;
    margin: 10px auto;
  }

  .app-header {
    padding: 14px 14px;
  }

  .app-title {
    font-size: 18px;
  }

  th, td {
    width: 88px;
    font-size: 12px;
    height: 48px;
  }

  .time-col,
  .corner,
  .lunch-time {
    width: 64px;
    min-width: 64px;
    font-size: 12px;
  }

  .day-head {
    top: 48px;
    font-size: 12px;
  }

  .title-row th {
    height: 48px;
  }

  .title-main {
    font-size: 15px;
  }
}
</style>
</head>

<body>

<div class="app-shell">
  <div class="app-card">

    <div class="app-header">
      <div class="app-title">時間割アプリ</div>
      <div class="app-subtitle">Forest Theme</div>
    </div>

    <div class="wrap">
      <table id="timetable"></table>
    </div>

  </div>
</div>

<script>
const days = ["月","火","水","木","金","土"];

const rows = [
  { type: "class", time: "1限\n8:30",  key: 0 },
  { type: "class", time: "2限\n10:30", key: 1 },
  { type: "class", time: "3限\n12:50", key: 2 },
  { type: "lunch", time: "昼休み", label: "12:50〜14:30" },
  { type: "class", time: "4限\n16:10", key: 3 },
  { type: "class", time: "5限\n17:50", key: 4 },
  { type: "class", time: "6限\n19:30", key: 5 }
];

const timetable = {
  "月": ["教職", "", "日本史", "総合", "", ""],
  "火": ["教育", "世界史", "外書", "", "アジア史", ""],
  "水": ["", "地理", "人文", "", "", ""],
  "木": ["特別", "地誌", "史学展開", "", "日本時代", "ICT教育"],
  "金": ["", "", "", "", "", ""],
  "土": ["教育", "", "", "", "", ""]
};

const todayIndex = new Date().getDay();
const dayMap = ["日","月","火","水","木","金","土"];
const today = dayMap[todayIndex];
const todayIndexInWeek = Math.max(0, days.indexOf(today));

function getCurrentClassIndex() {
  const now = new Date();
  const minutes = now.getHours() * 60 + now.getMinutes();

  const ranges = [
    [8 * 60 + 30, 10 * 60 + 29],
    [10 * 60 + 30, 12 * 60 + 29],
    [12 * 60 + 50, 14 * 60 + 29],
    [16 * 60 + 10, 17 * 60 + 49],
    [17 * 60 + 50, 19 * 60 + 29],
    [19 * 60 + 30, 21 * 60 + 0]
  ];

  for (let i = 0; i < ranges.length; i++) {
    if (minutes >= ranges[i][0] && minutes <= ranges[i][1]) {
      return i;
    }
  }
  return -1;
}

const nowIndex = getCurrentClassIndex();
const table = document.getElementById("timetable");

/* タイトル行 */
const titleTr = document.createElement("tr");
titleTr.className = "title-row";

const titleTh = document.createElement("th");
titleTh.className = "corner";
titleTh.textContent = "開始\n時刻";
titleTr.appendChild(titleTh);

for (let i = 0; i < todayIndexInWeek; i++) {
  const empty = document.createElement("th");
  empty.textContent = "";
  titleTr.appendChild(empty);
}

const titleMain = document.createElement("th");
titleMain.className = "lunch-main title-main";
titleMain.textContent = "前期時間割";
titleMain.style.textAlign = "center";
titleTr.appendChild(titleMain);

const titleRemain = 5 - todayIndexInWeek;
if (titleRemain > 0) {
  const titleMerged = document.createElement("th");
  titleMerged.className = "lunch-merge";
  titleMerged.colSpan = titleRemain;
  titleMerged.textContent = "";
  titleTr.appendChild(titleMerged);
}

table.appendChild(titleTr);

/* ヘッダー */
const headerTr = document.createElement("tr");

const corner = document.createElement("th");
corner.className = "corner";
corner.textContent = "";
headerTr.appendChild(corner);

days.forEach(day => {
  const th = document.createElement("th");
  th.className = "day-head";
  if (day === today) th.classList.add("today");
  th.textContent = day;
  headerTr.appendChild(th);
});

table.appendChild(headerTr);

/* 本体 */
rows.forEach(row => {
  const tr = document.createElement("tr");

  if (row.type === "lunch") {
    const th = document.createElement("th");
    th.className = "lunch-time";
    th.textContent = row.time;
    tr.appendChild(th);

    for (let i = 0; i < todayIndexInWeek; i++) {
      const empty = document.createElement("td");
      empty.textContent = "";
      tr.appendChild(empty);
    }

    const main = document.createElement("td");
    main.className = "lunch-main";
    main.textContent = row.label;
    tr.appendChild(main);

    const remain = 5 - todayIndexInWeek;
    if (remain > 0) {
      const merged = document.createElement("td");
      merged.className = "lunch-merge";
      merged.colSpan = remain;
      merged.textContent = "";
      tr.appendChild(merged);
    }

    table.appendChild(tr);
    return;
  }

  const th = document.createElement("th");
  th.className = "time-col";
  th.textContent = row.time;
  tr.appendChild(th);

  days.forEach(day => {
    const td = document.createElement("td");
    td.textContent = timetable[day][row.key] || "";

    if (day === today) td.classList.add("today");
    if (day === today && row.key === nowIndex) td.classList.add("now");

    tr.appendChild(td);
  });

  table.appendChild(tr);
});

/* 今日の列を最初から中央付近に表示 */
window.addEventListener("load", () => {
  const wrap = document.querySelector(".wrap");
  const headers = document.querySelectorAll(".day-head");
  const todayHeader = headers[todayIndexInWeek];

  if (wrap && todayHeader) {
    const wrapRect = wrap.getBoundingClientRect();
    const cellRect = todayHeader.getBoundingClientRect();

    const targetScroll =
      wrap.scrollLeft +
      (cellRect.left - wrapRect.left) -
      (wrap.clientWidth / 2) +
      (cellRect.width / 2);

    wrap.scrollLeft = Math.max(0, targetScroll);
  }
});
</script>

</body>
</html>
