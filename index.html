<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

.grid {
  display: grid;
  grid-template-columns: 80px repeat(6, 120px);
}

/* 共通セル */
.cell {
  border: 1px solid #ddd;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 左列（時間） */
.time {
  background: #eee;
  position: sticky;
  left: 0;
  z-index: 2;
}

/* 曜日ヘッダー */
.header {
  background: #f5f5f5;
  font-weight: bold;
  position: sticky;
  top: 0;
}

/* 昼休み行 */
.lunch-time {
  background: #eee;
  font-weight: bold;
  position: sticky;
  left: 0;
  z-index: 2;
}

.lunch {
  background: #fff9c4;
  font-weight: bold;
  grid-column: 2 / 8;
}

/* 今日・現在 */
.today { background: #ffe0b2; }
.now { background: #ffccbc; font-weight: bold; }
</style>
</head>

<body>

<div class="grid" id="grid"></div>

<script>

const days = ["月","火","水","木","金","土"];

const times = [
  "8:30",
  "10:30",
  "12:50",
  "13:30",
  "16:10",
  "17:50",
  "19:30"
];

const timetable = {
  "月": ["数","英","理","社","体","音","自"],
  "火": ["英","数","理","美","体","国","自"],
  "水": ["理","社","数","英","体","技","自"],
  "木": ["国","英","数","理","体","音","自"],
  "金": ["数","理","英","社","体","美","自"],
  "土": ["自","自","自","自","自","自","自"]
};

const grid = document.getElementById("grid");

/* =====================
ヘッダー
===================== */
grid.appendChild(make("cell time header",""));

days.forEach(d => {
  grid.appendChild(make("cell header", d));
});

/* =====================
本体
===================== */

for (let i = 0; i < times.length; i++) {

  // ★昼休み行を差し込む
  if (i === 2) {

    grid.appendChild(make("cell lunch-time", "昼休み"));

    const lunch = make("cell lunch", "12:50〜14:30");
    grid.appendChild(lunch);

    continue;
  }

  // 時間
  grid.appendChild(make("cell time", times[i]));

  // 授業
  days.forEach(d => {
    grid.appendChild(make("cell", timetable[d][i]));
  });
}

function make(cls, text){
  const div = document.createElement("div");
  div.className = cls;
  div.innerText = text;
  return div;
}

</script>

</body>
</html>
