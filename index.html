<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

header {
  background: #2196f3;
  color: white;
  padding: 15px;
  text-align: center;
}

/* 全体 */
.wrapper {
  display: flex;
}

/* 左（時間）固定 */
.time-column {
  background: #eee;
  padding: 10px;
}

.time-cell {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 右（スクロール） */
.scroll-area {
  overflow-x: auto;
  display: flex;
}

.day-column {
  min-width: 100px;
}

.day-title {
  text-align: center;
  font-weight: bold;
  padding: 10px;
  background: #f5f5f5;
}

.cell {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #ddd;
}
</style>
</head>

<body>

<header>時間割</header>

<div class="wrapper">

  <!-- 時間（固定） -->
  <div class="time-column" id="time"></div>

  <!-- 曜日（スクロール） -->
  <div class="scroll-area" id="days"></div>

</div>

<script>
const times = ["8:30","9:30","10:30","11:30","12:30","13:30","14:30"];

const timetable = {
  "月": ["数","英","理","社","体","音","自"],
  "火": ["英","数","理","美","体","国","自"],
  "水": ["理","社","数","英","体","技","自"],
  "木": ["国","英","数","理","体","音","自"],
  "金": ["数","理","英","社","体","美","自"],
  "土": ["自","自","自","自","自","自","自"]
};

// 時間列
const timeDiv = document.getElementById("time");
times.forEach(t => {
  const div = document.createElement("div");
  div.className = "time-cell";
  div.innerText = t;
  timeDiv.appendChild(div);
});

// 曜日列
const daysDiv = document.getElementById("days");

for (const day in timetable) {
  const col = document.createElement("div");
  col.className = "day-column";

  const title = document.createElement("div");
  title.className = "day-title";
  title.innerText = day;
  col.appendChild(title);

  timetable[day].forEach(sub => {
    const div = document.createElement("div");
    div.className = "cell";
    div.innerText = sub;
    col.appendChild(div);
  });

  daysDiv.appendChild(col);
}

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
