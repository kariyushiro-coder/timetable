<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>前期時間割</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* ===== 省略せずそのまま ===== */
body {
  margin: 0;
  font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
}

.wrap {
  overflow-x: auto;
  overflow-y: visible; /* ← 重要修正 */
}

table {
  border-collapse: collapse;
  table-layout: fixed;
  min-width: 820px;
  transform-origin: top left;
}

th, td {
  border: 1px solid #ccc;
  width: 120px;
  height: 54px;
  text-align: center;
}

.corner, .time-col, .lunch-time {
  position: sticky;
  left: 0;
  background: #eee;
  z-index: 3;
  width: 92px;
}

/* スマホ */
@media screen and (max-width:600px){
  th, td {
    width:60px;
    height:40px;
    font-size:9px;
  }
  .corner,.time-col,.lunch-time{
    width:44px;
    min-width:44px;
  }
}
</style>
</head>

<body>

<div class="wrap">
  <table id="timetable"></table>
</div>

<script>
const days = ["月","火","水","木","金","土"];

const rows = [
  { type: "class", time: "1限\n8:30",  key: 0 },
  { type: "class", time: "2限\n10:30", key: 1 },
  { type: "class", time: "3限\n12:50", key: 2 },
  { type: "lunch", time: "昼休み", label: "12:50〜14:30" },
  { type: "class", time: "4限\n16:10", key: 3 },
  { type: "class", time: "5限\n17:50", key: 4 },
  { type: "class", time: "6限\n19:30", key: 5 }
];

const timetable = {
  "月": ["教職", "", "日本史", "総合", "", ""],
  "火": ["教育", "世界史", "外書", "", "アジア史", ""],
  "水": ["", "地理", "人文", "", "", ""],
  "木": ["特別", "地誌", "史学展開", "", "日本時代", "ICT教育"],
  "金": ["", "", "", "", "", ""],
  "土": ["教育", "", "", "", "", ""]
};

const todayIndex = new Date().getDay();
const dayMap = ["日","月","火","水","木","金","土"];
const today = dayMap[todayIndex];
const todayIndexInWeek = Math.max(0, days.indexOf(today));

function getCurrentClassIndex() {
  const now = new Date();
  const minutes = now.getHours()*60 + now.getMinutes();

  const ranges = [
    [510,629],
    [630,749],
    [770,869],
    [970,1069],
    [1070,1169],
    [1170,1260]
  ];

  for(let i=0;i<ranges.length;i++){
    if(minutes>=ranges[i][0] && minutes<=ranges[i][1]) return i;
  }
  return -1;
}

const nowIndex = getCurrentClassIndex();
const table = document.getElementById("timetable");

/* ===== ヘッダー ===== */
const headerTr = document.createElement("tr");

const corner = document.createElement("th");
corner.className = "corner";
corner.textContent = "開始\n時刻";
headerTr.appendChild(corner);

days.forEach(day=>{
  const th = document.createElement("th");
  th.textContent = day;
  if(day===today) th.style.background="#ffe0b2";
  headerTr.appendChild(th);
});
table.appendChild(headerTr);

/* ===== 本体 ===== */
rows.forEach(row=>{
  const tr = document.createElement("tr");

  if(row.type==="lunch"){
    const th = document.createElement("th");
    th.className="lunch-time";
    th.textContent=row.time;
    tr.appendChild(th);

    const td=document.createElement("td");
    td.colSpan=6;
    td.textContent=row.label;
    td.style.background="#fff9c4";
    tr.appendChild(td);

    table.appendChild(tr);
    return;
  }

  const th=document.createElement("th");
  th.className="time-col";
  th.textContent=row.time;
  tr.appendChild(th);

  days.forEach(day=>{
    const td=document.createElement("td");

    if(day===today) td.style.background="#e2f3dc";
    if(day===today && row.key===nowIndex) td.style.background="#ffccbc";

    td.textContent=timetable[day][row.key]||"";
    tr.appendChild(td);
  });

  table.appendChild(tr);
});

/* ===== 横表示：高さも含めて全体フィット ===== */
function fitLandscape(){
  const wrap=document.querySelector(".wrap");
  const table=document.getElementById("timetable");
  if(!wrap||!table) return;

  table.style.transform="none";

  if(window.innerHeight>window.innerWidth) return;

  const fullW=table.scrollWidth;
  const fullH=table.scrollHeight;

  const availW=wrap.clientWidth;
  const availH=window.innerHeight-10;

  const scaleX=availW/fullW;
  const scaleY=availH/fullH;

  let scale=Math.min(scaleX,scaleY);

  if(scale>1) scale=1;
  if(scale<0.65) scale=0.65;

  table.style.transform="scale("+scale+")";
}

/* Safari対策 */
function applyLayout(){
  fitLandscape();

  requestAnimationFrame(()=>{
    setTimeout(fitLandscape,120);
  });
}

window.addEventListener("load",applyLayout);
window.addEventListener("resize",applyLayout);
window.addEventListener("orientationchange",()=>setTimeout(applyLayout,120));
</script>

</body>
</html>
