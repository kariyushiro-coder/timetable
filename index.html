<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

/* 横並び */
.wrapper {
  display: flex;
}

/* ★左（固定） */
.time-column {
  flex-shrink: 0;
  background: #eee;
}

.time-cell {
  width: 80px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #ddd;
}

/* ★右（スクロール） */
.scroll-area {
  overflow-x: auto;
}

/* 列 */
.day-row {
  display: flex;
}

/* 曜日ヘッダー */
.day-title {
  width: 120px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  background: #f5f5f5;
  border: 1px solid #ddd;
}

/* セル */
.cell {
  width: 120px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #ddd;
}

/* 今日 */
.today {
  background: #ffe0b2;
  font-weight: bold;
}

/* 昼休み行 */
.lunch-left {
  width: 80px;
  height: 50px;
  background: #eee;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #ddd;
}

.lunch {
  width: 720px;
  height: 50px;
  background: #fff9c4;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #ddd;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- 左固定 -->
  <div class="time-column" id="time"></div>

  <!-- 右スクロール -->
  <div class="scroll-area" id="days"></div>

</div>

<script>

const times = [
  "8:30",
  "10:30",
  "12:50",
  "昼休み",
  "16:10",
  "17:50",
  "19:30"
];

const days = ["月","火","水","木","金","土"];

const timetable = {
  "月": ["教職","","日本史","", "総合","",""],
  "火": ["教育","世界史","外書","", "アジア史","",""],
  "水": ["","地理","人文","","","",""],
  "木": ["特別","地誌","史学展開","","日本時代","",""],
  "金": ["","","","","",""],
  "土": ["教育","","","","",""]
};

const todayIndex = new Date().getDay();
const dayMap = ["日","月","火","水","木","金","土"];
const today = dayMap[todayIndex];

const timeDiv = document.getElementById("time");
const daysDiv = document.getElementById("days");

/* ===== 左列 ===== */
times.forEach(t => {
  const div = document.createElement("div");
  div.className = "time-cell";
  div.innerText = t;
  timeDiv.appendChild(div);
});

/* ===== 右側 ===== */
for (let i = 0; i < times.length; i++) {

  // 昼休み行
  if (i === 3) {

    const row = document.createElement("div");
    row.style.display = "flex";

    const left = document.createElement("div");
    left.className = "lunch-left";
    left.innerText = "昼休み";

    const right = document.createElement("div");
    right.className = "lunch";
    right.innerText = "12:50〜14:30";

    row.appendChild(left);
    row.appendChild(right);

    daysDiv.appendChild(row);
    continue;
  }

  const row = document.createElement("div");
  row.style.display = "flex";

  days.forEach(d => {
    const div = document.createElement("div");
    div.className = "cell";
    div.innerText = timetable[d][i > 3 ? i - 1 : i] || "";
    row.appendChild(div);
  });

  daysDiv.appendChild(row);
}

</script>

</body>
</html>
