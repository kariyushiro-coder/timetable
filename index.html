<style>
body {
  margin: 0;
  font-family: sans-serif;
}

header {
  background: #2196f3;
  color: white;
  padding: 15px;
  text-align: center;
}

/* 横スクロール */
.container {
  overflow-x: auto;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: 80px repeat(6, 120px);
  min-width: 800px;
}

/* セル */
.cell {
  border: 1px solid #ddd;
  min-height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
  padding: 5px;
}

/* 時間固定 */
.time {
  position: sticky;
  left: 0;
  background: #eee;
  z-index: 2;
}

/* 曜日 */
.day-title {
  background: #f5f5f5;
  font-weight: bold;

  position: sticky;
  top: 0;
  z-index: 3;

  min-height: 50px; 
  padding: 0; 
}

/* 昼休み */
.lunch {
  grid-column: 2 / 8;
  background: #fff9c4;
  font-weight: bold;
}

/* 今日 */
.today {
  border: 3px solid #ff9800;
  background: #ffe0b2;
}

/* 今の授業 */
.now {
  border: 3px solid #ff5722;
  font-weight: bold;
}
</style>

<div class="container">
  <div class="grid" id="grid"></div>
</div>

<script>
const days = ["月","火","水","木","金","土"];

const periods = [
  { start: "08:50", end: "10:20" },
  { start: "10:30", end: "12:00" },
  { start: "12:50", end: "14:20" },
  { start: "16:10", end: "17:40" },
  { start: "17:50", end: "19:20" },
  { start: "19:30", end: "21:00" }
];

const timetable = {
  "月": ["教職","","","日本史","総合","",""],
  "火": ["教育","世界史","外書","","","アジア史",""],
  "水": ["","地理","人文","","","",""],
  "木": ["特別","地誌","史学展開","","","日本時代","ICT教育"],
  "金": ["","","","","","",""],
  "土": ["教育と社会","","","","","",""]
};
const todayIndex = new Date().getDay();
const dayMap = ["日","月","火","水","木","金","土"];
const today = dayMap[todayIndex];
const grid = document.getElementById("grid");

/* ===== ヘッダー ===== */
grid.appendChild(createCell("", "cell time"));

days.forEach(day => {
  const cell = createCell(day, "cell day-title");

  if (day === today) {
    cell.classList.add("today");
  }

  grid.appendChild(cell);
});

/* ===== 本体 ===== */
periods.forEach((p, i) => {

  // 時間
  grid.appendChild(createCell(p.start, "cell time"));

const lunch = createCell("12:50〜14:30", "cell lunch");
grid.appendChild(lunch);

  // 昼休み
  if (i === 1) {

  // ===== 昼休みブロック =====
grid.appendChild(createCell("昼休み", "cell time"));

days.forEach(day => {
  grid.appendChild(createCell("12:50〜14:30", "cell lunch"));
});

}
});

function createCell(text, className) {
  const div = document.createElement("div");
  div.className = className;
  div.innerText = text;
  return div;
}
</script>
