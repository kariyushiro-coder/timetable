<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>前期時間割</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f7f51">

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg-1: #eef7ee;
  --bg-2: #dfeedd;
  --card: rgba(255,255,255,0.78);
  --line: #d4e4d0;
  --text: #243224;

  --forest-1: #6ea56d;
  --forest-2: #4f7f51;
  --forest-3: #355d39;

  --today: #e2f3dc;
  --today-soft: #f4fbf1;
  --now: #5f8f57;
  --now-text: #ffffff;

  --time-bg: #edf5ea;
  --head-bg: #f3faf1;
  --title-bg: #dcefd7;

  --lunch-main: #eef6c8;
  --lunch-merge: #ffffff;

  --pill-bg: #ffffff;
  --pill-line: #d6e4d2;
  --pill-shadow: 0 4px 10px rgba(53, 94, 59, 0.08);

  --shadow-lg: 0 16px 40px rgba(43, 75, 47, 0.16);
  --sticky-shadow: 6px 0 10px rgba(53, 94, 59, 0.06);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(126, 179, 118, 0.20), transparent 28%),
    radial-gradient(circle at top right, rgba(95, 143, 87, 0.14), transparent 22%),
    linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
}

.app {
  max-width: 1100px;
  margin: 18px auto;
  padding: 12px;
}

.app-shell {
  background: var(--card);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.5);
  border-radius: 24px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}

.hero {
  padding: 18px 18px 14px;
  background: linear-gradient(135deg, rgba(110,165,109,0.95) 0%, rgba(79,127,81,0.95) 100%);
  color: #fff;
}

.hero-top {
  display: flex;
  align-items: center;
  gap: 10px;
}

.hero-badge {
  width: 38px;
  height: 38px;
  border-radius: 999px;
  background: rgba(255,255,255,0.18);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.14);
}

.hero-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.04em;
}

.hero-sub {
  margin-top: 6px;
  font-size: 12px;
  opacity: 0.98;
  font-weight: 500;
}

.table-wrap {
  padding: 12px;
  overflow-x: auto;
  overflow-y: visible;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

.table-wrap::-webkit-scrollbar {
  height: 10px;
}
.table-wrap::-webkit-scrollbar-track {
  background: rgba(110,165,109,0.10);
  border-radius: 999px;
}
.table-wrap::-webkit-scrollbar-thumb {
  background: rgba(95,143,87,0.45);
  border-radius: 999px;
}

table {
  border-collapse: separate;
  border-spacing: 0;
  table-layout: fixed;
  min-width: 820px;
  background: transparent;
  transform-origin: top left;
}

th, td {
  width: 120px;
  height: 54px;
  text-align: center;
  vertical-align: middle;
  padding: 0;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  background: rgba(255,255,255,0.88);
  white-space: nowrap;
  font-size: 14px;
}

/* 左端 */
.corner,
.time-col,
.lunch-time {
  width: 92px;
  min-width: 92px;
  background: var(--time-bg);
  position: sticky;
  left: 0;
  z-index: 4;
  color: var(--forest-3);
  font-weight: 700;
  box-shadow: var(--sticky-shadow);
}

.corner {
  z-index: 6;
  white-space: pre-line;
  border-left: 1px solid var(--line);
}

.time-col {
  white-space: pre-line;
  line-height: 1.2;
  border-left: 1px solid var(--line);
  font-size: 13px;
}

.day-head {
  background: var(--head-bg);
  position: sticky;
  top: 54px;
  z-index: 3;
  font-weight: 700;
  color: var(--forest-3);
  box-shadow: inset 0 -1px 0 rgba(53, 94, 59, 0.08);
}

/* タイトル行 */
.title-row th {
  background: var(--title-bg);
  color: var(--forest-3);
  border-left: none;
  border-right: none;
  font-weight: 700;
  height: 54px;
}

.title-main {
  font-size: 18px;
  letter-spacing: 0.08em;
}

/* 今日の列 */
.today {
  background: var(--today) !important;
}

/* 通常セルの中身をカプセル化 */
.class-cell {
  padding: 6px;
  background: rgba(255,255,255,0.84);
}

.lesson-pill {
  min-height: 34px;
  padding: 6px 8px;
  border-radius: 999px;
  background: var(--pill-bg);
  border: 1px solid var(--pill-line);
  box-shadow: var(--pill-shadow);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  line-height: 1.25;
  width: calc(100% - 8px);
  margin: 0 auto;
  color: #304130;
}

/* 今日の列のカプセル */
.today .lesson-pill {
  background: var(--today-soft);
  border-color: #cfe4c8;
}

/* 今の授業 */
.now {
  background: #d8efd1 !important;
}


/* 昼休み */
.lunch-time {
  z-index: 4;
  font-size: 13px;
}

.lunch-main {
  background: var(--lunch-main);
  font-weight: 700;
  color: #586437;
  letter-spacing: 0.02em;
}

.lunch-merge {
  background: var(--lunch-merge);
}

/* 角丸感 */
table tr:first-child th:first-child {
  border-top-left-radius: 16px;
}
table tr:first-child th:last-child {
  border-top-right-radius: 16px;
}
table tr:last-child th.time-col,
table tr:last-child th.lunch-time {
  border-bottom-left-radius: 16px;
}
table tr:last-child td:last-child {
  border-bottom-right-radius: 16px;
}

table tr:first-child th {
  border-top: 1px solid var(--line);
}
table tr td:first-of-type,
table tr th:first-of-type {
  border-left: 1px solid var(--line);
}

/* スマホ調整 */
@media screen and (max-width: 600px) {
  .app {
    margin: 4px auto;
    padding: 4px;
  }

  .app-shell {
    border-radius: 16px;
  }

  .hero {
    padding: 10px 10px 8px;
  }

  .hero-title {
    font-size: 15px;
  }

  .hero-sub {
    font-size: 10px;
  }

  .table-wrap {
    padding: 6px;
  }

  th, td {
    width: 56px;
    height: 40px;
    font-size: 9px;
  }

  .corner,
  .time-col,
  .lunch-time {
    width: 42px;
    min-width: 42px;
    font-size: 9px;
  }

  .day-head {
    top: 40px;
    font-size: 10px;
  }

  .title-row th {
    height: 40px;
  }

  .title-main {
    font-size: 11px;
  }

  .class-cell {
    padding: 1px;
  }

  .lesson-pill {
    min-height: 20px;
    padding: 2px 3px;
    font-size: 8px;
    width: calc(100% - 2px);
    line-height: 1.15;
  }
}
  /* ===== 時間帯別 今の授業 ===== */

/* 午前（1-2限） */
.now-morning .lesson-pill {
  background: #81c784;
  color: #fff;
}

/* 昼（3-4限） */
.now-day .lesson-pill {
  background: #ffd54f;
  color: #5d4037;
}

/* 夕方（5-6限） */
.now-evening .lesson-pill {
  background: #ff8a65;
  color: #fff;
}

/* 夜（7限） */
.now-night .lesson-pill {
  background: #3949ab;
  color: #fff;
}
</style>
</head>

<body>

<div class="app">
  <div class="app-shell">

    <div class="hero">
      <div class="hero-top">
        <div class="hero-badge">🌿</div>
        <div class="hero-title">2026年度 前期時間割</div>
      </div>
      <div class="hero-sub">宇根 花美</div>
    </div>

    <div class="table-wrap wrap">
      <table id="timetable"></table>
    </div>

  </div>
</div>

<script>
const days = ["月","火","水","木","金","土"];

const rows = [
  { type: "class", time: "1限\n8:50",  key: 0 },
  { type: "class", time: "2限\n10:30", key: 1 },
  { type: "lunch", time: "昼休み", label: "12:00〜12:50" },
  { type: "class", time: "3限\n12:50", key: 2 },
  { type: "class", time: "4限\n14:30", key: 3 },
  { type: "class", time: "5限\n16:10", key: 4 },
  { type: "class", time: "6限\n17:50", key: 5 },
  { type: "class", time: "7限\n19:30", key: 6 }  // ←追加
];

const timetable = {
"月": ["教育課程", "", "", "日本時代", "総合的な", "", ""],
"火": ["教育の方", "西洋史概", "外書購読", "", "", "東洋史概", ""],
"水": ["", "地理歴史", "人文地理", "", "", "", ""],
"木": ["特別支援", "地誌学", "史学展開", "", "", "日本時代", "ICT教育"],
"金": ["", "", "", "", "", "", ""],
"土": ["教育と社", "", "", "", "", "", ""]
};

const todayIndex = new Date().getDay();
const dayMap = ["日","月","火","水","木","金","土"];
const today = dayMap[todayIndex];
const todayIndexInWeek = Math.max(0, days.indexOf(today));

function getCurrentClassIndex() {
  const now = new Date();
  const minutes = now.getHours() * 60 + now.getMinutes();

  const ranges = [
  [8 * 60 + 50, 10 * 60 + 29],  // 1限
  [10 * 60 + 30, 11 * 60 + 59], // 2限
  [12 * 60 + 50, 14 * 60 + 29], // 3限
  [14 * 60 + 30, 16 * 60 + 9],  // 4限
  [16 * 60 + 10, 17 * 60 + 49], // 5限
  [17 * 60 + 50, 19 * 60 + 29], // 6限
  [19 * 60 + 30, 21 * 60 + 9]   // 7限
];

  for (let i = 0; i < ranges.length; i++) {
    if (minutes >= ranges[i][0] && minutes <= ranges[i][1]) {
      return i;
    }
  }
  return -1;
}

const nowIndex = getCurrentClassIndex();
const table = document.getElementById("timetable");

/* タイトル行 */
const titleTr = document.createElement("tr");
titleTr.className = "title-row";

const titleTh = document.createElement("th");
titleTh.className = "corner";
titleTh.textContent = "開始\n時刻";
titleTr.appendChild(titleTh);

for (let i = 0; i < todayIndexInWeek; i++) {
  const empty = document.createElement("th");
  empty.textContent = "";
  titleTr.appendChild(empty);
}

const titleMain = document.createElement("th");
titleMain.className = "lunch-main title-main";
titleMain.textContent = "今日の授業";
titleMain.style.textAlign = "center";
titleTr.appendChild(titleMain);

const titleRemain = 5 - todayIndexInWeek;
if (titleRemain > 0) {
  const titleMerged = document.createElement("th");
  titleMerged.className = "lunch-merge";
  titleMerged.colSpan = titleRemain;
  titleMerged.textContent = "";
  titleTr.appendChild(titleMerged);
}

table.appendChild(titleTr);

/* 曜日ヘッダー */
const headerTr = document.createElement("tr");

const corner = document.createElement("th");
corner.className = "corner";
corner.textContent = "";
headerTr.appendChild(corner);

days.forEach(day => {
  const th = document.createElement("th");
  th.className = "day-head";
  if (day === today) th.classList.add("today");
  th.textContent = day;
  headerTr.appendChild(th);
});

table.appendChild(headerTr);

/* 本体 */
rows.forEach(row => {
  const tr = document.createElement("tr");

  if (row.type === "lunch") {
    const th = document.createElement("th");
    th.className = "lunch-time";
    th.textContent = row.time;
    tr.appendChild(th);

    for (let i = 0; i < todayIndexInWeek; i++) {
      const empty = document.createElement("td");
      empty.textContent = "";
      tr.appendChild(empty);
    }

    const main = document.createElement("td");
    main.className = "lunch-main";
    main.textContent = row.label;
    tr.appendChild(main);

    const remain = 5 - todayIndexInWeek;
    if (remain > 0) {
      const merged = document.createElement("td");
      merged.className = "lunch-merge";
      merged.colSpan = remain;
      merged.textContent = "";
      tr.appendChild(merged);
    }

    table.appendChild(tr);
    return;
  }

  const th = document.createElement("th");
  th.className = "time-col";
  th.textContent = row.time;
  tr.appendChild(th);

  days.forEach(day => {
    const td = document.createElement("td");
    td.className = "class-cell";

    if (day === today) td.classList.add("today");
    if (day === today && row.type === "class" && row.key === nowIndex) {

  if (nowIndex <= 1) {
    td.classList.add("now-morning");   // 1-2限
  } else if (nowIndex <= 3) {
    td.classList.add("now-day");       // 3-4限
  } else if (nowIndex <= 5) {
    td.classList.add("now-evening");   // 5-6限
  } else {
    td.classList.add("now-night");     // 7限
  }

}

    const text = timetable[day][row.key] || "";

// 空欄でも、今の授業なら pill を作る
if (text || (day === today && row.type === "class" && row.key === nowIndex)) {
  const pill = document.createElement("div");
  pill.className = "lesson-pill";
  pill.textContent = text || "―";
  td.appendChild(pill);
}

    tr.appendChild(td);
  });

  table.appendChild(tr);
});

/* 縦表示：今日を左寄りに配置 */
function positionPortrait() {
  const wrap = document.querySelector(".wrap");
  const headers = document.querySelectorAll(".day-head");

  if (!wrap || headers.length === 0) return;

  if (window.innerHeight > window.innerWidth) {

    const todayHeader = headers[todayIndexInWeek];

    const left = todayHeader.offsetLeft;

    // ← これが重要（固定列の幅）
    const leftColWidth = document.querySelector(".time-col").offsetWidth;

    wrap.scrollLeft = Math.max(0, left - leftColWidth);
  }
}

/* 横表示：高さも含めて全体が入るように縮小 */
function fitLandscape() {
  const wrap = document.querySelector(".wrap");
  const table = document.getElementById("timetable");
  if (!wrap || !table) return;

  table.style.transform = "none";
  table.style.transformOrigin = "top left";

  if (window.innerHeight > window.innerWidth) return;

  const fullWidth = table.scrollWidth;
  const fullHeight = table.scrollHeight;

  const availableWidth = wrap.clientWidth;
  const availableHeight = window.innerHeight - 10;

  const scaleX = availableWidth / fullWidth;
  const scaleY = availableHeight / fullHeight;

  let scale = Math.min(scaleX, scaleY);

  if (scale > 1) scale = 1;
  if (scale < 0.65) scale = 0.65;

  table.style.transform = "scale(" + scale + ")";
  wrap.scrollLeft = 0;
}

/* Safari対策込み */
function applyLayout() {
  fitLandscape();

  requestAnimationFrame(() => {
    setTimeout(() => {
      fitLandscape();
      positionPortrait();
    }, 120);
  });
}

window.addEventListener("load", applyLayout);
window.addEventListener("resize", applyLayout);
window.addEventListener("orientationchange", () => {
  setTimeout(applyLayout, 120);
});
</script>

</body>
</html>
