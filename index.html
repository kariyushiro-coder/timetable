<style>
body {
  margin: 0;
  font-family: sans-serif;
}

/* ★スクロール領域（下スクロール完全防止） */
.container {
  overflow-x: auto;
  overflow-y: hidden;
  width: 100vw;
}

/* ★テーブル全体 */
.grid {
  display: grid;
  grid-template-columns: 80px repeat(6, 120px);
  width: max-content; /* ★重要：これで横暴走防止 */
}

/* セル */
.cell {
  border: 1px solid #ddd;
  min-height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
}

/* ★左固定 */
.time {
  position: sticky;
  left: 0;
  background: #eee;
  z-index: 30;
  min-width: 80px;
}

/* ★上固定（曜日） */
.day-title {
  background: #f5f5f5;
  font-weight: bold;
  position: sticky;
  top: 0;
  z-index: 10;
}

/* 昼休み */
.lunch {
  grid-column: 2 / 8;
  background: #fff9c4;
  font-weight: bold;
  text-align: center;
}

/* 今日 */
.today {
  border: 3px solid #ff9800;
  background: #ffe0b2;
}
</style>

<div class="container">
  <div class="grid" id="grid"></div>
</div>

<script>
const days = ["月","火","水","木","金","土"];

const periods = [
  { start: "08:50" },
  { start: "10:30" },
  { start: "昼休み", lunch: true },
  { start: "12:50" },
  { start: "16:10" },
  { start: "17:50" },
  { start: "19:30" }
];

const timetable = {
  "月": ["教職","","","日本史","総合","",""],
  "火": ["教育","世界史","外書","","","アジア史",""],
  "水": ["","地理","人文","","","",""],
  "木": ["特別","地誌","史学展開","","","日本時代","ICT教育"],
  "金": ["","","","","","",""],
  "土": ["教育と社会","","","","","",""]
};

const todayIndex = new Date().getDay();
const dayMap = ["日","月","火","水","木","金","土"];
const today = dayMap[todayIndex];

const grid = document.getElementById("grid");

/* ===== ヘッダー ===== */
grid.appendChild(createCell("", "cell time"));

days.forEach(day => {
  const cell = createCell(day, "cell day-title");
  if (day === today) cell.classList.add("today");
  grid.appendChild(cell);
});

/* ===== 本体 ===== */
periods.forEach((p, i) => {

  // ★左時間列
  const timeCell = createCell(p.start, "cell time");
  grid.appendChild(timeCell);

  // ★昼休み
  if (p.lunch) {
    const lunch = createCell("12:50〜14:30", "cell lunch");
    grid.appendChild(lunch);
    return;
  }

  // ★授業
  days.forEach(day => {
    grid.appendChild(createCell(timetable[day][i] || "", "cell"));
  });

});

function createCell(text, className) {
  const div = document.createElement("div");
  div.className = className;
  div.innerText = text;
  return div;
}
</script>
