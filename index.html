<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f0f2f5;
}

header {
  background: #2196f3;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.tabs {
  display: flex;
  overflow-x: auto;
  background: white;
}

.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  border-bottom: 3px solid transparent;
}

.tab.active {
  border-bottom: 3px solid #2196f3;
  font-weight: bold;
}

.container {
  padding: 10px;
}

.card {
  background: white;
  margin: 10px 0;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.period {
  font-weight: bold;
  color: #2196f3;
}
</style>
</head>

<body>

<header>時間割</header>

<div class="tabs" id="tabs"></div>

<div class="container" id="content"></div>

<script>
const timetable = {
  "月": ["数学","英語","理科","社会","体育","音楽","自習"],
  "火": ["英語","数学","理科","美術","体育","国語","自習"],
  "水": ["理科","社会","数学","英語","体育","技術","自習"],
  "木": ["国語","英語","数学","理科","体育","音楽","自習"],
  "金": ["数学","理科","英語","社会","体育","美術","自習"],
  "土": ["自習","自習","自習","自習","自習","自習","自習"]
};

const days = Object.keys(timetable);

const tabs = document.getElementById("tabs");
const content = document.getElementById("content");

// タブ生成
days.forEach((day, index) => {
  const tab = document.createElement("div");
  tab.className = "tab";
  tab.innerText = day;

  tab.onclick = () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    showDay(day);
  };

  if (index === 0) tab.classList.add("active");

  tabs.appendChild(tab);
});

// 表示
function showDay(day) {
  content.innerHTML = "";
  timetable[day].forEach((subject, i) => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<div class="period">${i+1}限</div>${subject}`;
    content.appendChild(div);
  });
}

// 初期表示
showDay(days[0]);

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
