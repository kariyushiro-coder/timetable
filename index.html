<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

header {
  background: #2196f3;
  color: white;
  padding: 15px;
  text-align: center;
}

/* 全体 */
.wrapper {
  display: flex;
}

/* 左（時間）固定 */
.time-column {
  background: #eee;
  padding: 10px;
}

.time-cell {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #ddd;
}

/* 右（スクロール） */
.scroll-area {
  overflow-x: auto;
  display: flex;
}

.day-column {
  min-width: 100px;
}

/* 曜日ヘッダー */
.day-title {
  text-align: center;
  font-weight: bold;
  padding: 10px;
  background: #f5f5f5;
  border: 1px solid #ddd;
}

/* セル */
.cell {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #ddd;
}

/* =========================
ハイライト追加
========================= */

/* 今日の曜日 */
.today {
  background: #ffe0b2;
  font-weight: bold;
}

/* 今の授業 */
.now {
  background: #ffccbc;
  font-weight: bold;
  border: 2px solid #ff5722;
}

/* 昼休み */
.lunch {
  background: #fff9c4;
  font-weight: bold;
}
</style>
</head>

<body>

<header>時間割</header>

<div class="wrapper">

  <div class="time-column" id="time"></div>
  <div class="scroll-area" id="days"></div>

</div>

<script>

const times = ["8:30","9:30","10:30","11:30","12:30","13:30","14:30"];

const days = ["月","火","水","木","金","土"];

const timetable = {
  "月": ["数","英","理","社","体","音","自"],
  "火": ["英","数","理","美","体","国","自"],
  "水": ["理","社","数","英","体","技","自"],
  "木": ["国","英","数","理","体","音","自"],
  "金": ["数","理","英","社","体","美","自"],
  "土": ["自","自","自","自","自","自","自"]
};

/* =====================
時間列
===================== */
const timeDiv = document.getElementById("time");

times.forEach((t, i) => {

  const div = document.createElement("div");
  div.className = "time-cell";

  if (i === 4) {
    div.innerText = "昼休み";
    div.classList.add("lunch");
  } else {
    div.innerText = t;
  }

  timeDiv.appendChild(div);
});

/* =====================
今日判定
===================== */
const todayIndex = new Date().getDay();
const dayMap = ["日","月","火","水","木","金","土"];
const today = dayMap[todayIndex];

/* =====================
今の時間判定
===================== */
function getCurrentIndex() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const t = h * 60 + m;

  const ranges = [
    [8*60+30, 9*60+30],
    [9*60+30, 10*60+30],
    [10*60+30, 11*60+30],
    [11*60+30, 12*60+30],
    [12*60+30, 13*60+30],
    [13*60+30, 14*60+30],
  ];

  for (let i = 0; i < ranges.length; i++) {
    if (t >= ranges[i][0] && t < ranges[i][1]) {
      return i;
    }
  }
  return -1;
}

const nowIndex = getCurrentIndex();

/* =====================
曜日列
===================== */
const daysDiv = document.getElementById("days");

days.forEach(day => {

  const col = document.createElement("div");
  col.className = "day-column";

  // ヘッダー
  const title = document.createElement("div");
  title.className = "day-title";

  if (day === today) {
    title.classList.add("today");
  }

  title.innerText = day;
  col.appendChild(title);

  // セル
  timetable[day].forEach((sub, i) => {

    const div = document.createElement("div");
    div.className = "cell";

    if (i === nowIndex && day === today) {
      div.classList.add("now");
    }

    div.innerText = sub;
    col.appendChild(div);
  });

  daysDiv.appendChild(col);
});

</script>

</body>
</html>
