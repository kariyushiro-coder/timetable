<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f0f2f5;
}

header {
  background: #2196f3;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

/* 横スクロール */
.container {
  display: flex;
  overflow-x: auto;
  padding: 10px;
  gap: 10px;
}

/* 列 */
.column {
  min-width: 120px;
}

/* 時間列 */
.time {
  background: #ddd;
  border-radius: 10px;
  padding: 10px;
}

/* 曜日 */
.day {
  background: white;
  border-radius: 15px;
  padding: 10px;
  min-width: 180px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.title {
  font-weight: bold;
  text-align: center;
  margin-bottom: 10px;
  color: #2196f3;
}

.cell {
  margin: 5px 0;
  padding: 8px;
  background: #f9f9f9;
  border-radius: 8px;
}
</style>
</head>

<body>

<header>時間割</header>

<div class="container" id="content"></div>

<script>
// 開始時間
const times = [
  "8:30","9:30","10:30","11:30","12:30","13:30","14:30"
];

// 時間割
const timetable = {
  "月": ["数学","英語","理科","社会","体育","音楽","自習"],
  "火": ["英語","数学","理科","美術","体育","国語","自習"],
  "水": ["理科","社会","数学","英語","体育","技術","自習"],
  "木": ["国語","英語","数学","理科","体育","音楽","自習"],
  "金": ["数学","理科","英語","社会","体育","美術","自習"],
  "土": ["自習","自習","自習","自習","自習","自習","自習"]
};

const content = document.getElementById("content");

// 時間列（固定）
const timeCol = document.createElement("div");
timeCol.className = "column time";

const timeTitle = document.createElement("div");
timeTitle.className = "title";
timeTitle.innerText = "開始";
timeCol.appendChild(timeTitle);

times.forEach(t => {
  const div = document.createElement("div");
  div.className = "cell";
  div.innerText = t;
  timeCol.appendChild(div);
});

content.appendChild(timeCol);

// 各曜日
for (const day in timetable) {
  const col = document.createElement("div");
  col.className = "column day";

  const title = document.createElement("div");
  title.className = "title";
  title.innerText = day + "曜日";
  col.appendChild(title);

  timetable[day].forEach(subject => {
    const div = document.createElement("div");
    div.className = "cell";
    div.innerText = subject;
    col.appendChild(div);
  });

  content.appendChild(col);
}

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
