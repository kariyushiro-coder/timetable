<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f0f2f5;
}

header {
  background: #2196f3;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

/* 横スクロール */
.container {
  display: flex;
  overflow-x: auto;
  padding: 10px;
  gap: 10px;
}

/* 曜日カード */
.day {
  min-width: 250px;
  background: white;
  border-radius: 15px;
  padding: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.day-title {
  font-weight: bold;
  margin-bottom: 10px;
  text-align: center;
  color: #2196f3;
}

/* 授業 */
.card {
  background: #f9f9f9;
  margin: 5px 0;
  padding: 10px;
  border-radius: 10px;
}

.period {
  font-size: 12px;
  color: #2196f3;
}
</style>
</head>

<body>

<header>時間割</header>

<div class="container" id="content"></div>

<script>
const timetable = {
  "月": ["数学","英語","理科","社会","体育","音楽","自習"],
  "火": ["英語","数学","理科","美術","体育","国語","自習"],
  "水": ["理科","社会","数学","英語","体育","技術","自習"],
  "木": ["国語","英語","数学","理科","体育","音楽","自習"],
  "金": ["数学","理科","英語","社会","体育","美術","自習"],
  "土": ["自習","自習","自習","自習","自習","自習","自習"]
};

const content = document.getElementById("content");

for (const day in timetable) {
  const dayDiv = document.createElement("div");
  dayDiv.className = "day";

  const title = document.createElement("div");
  title.className = "day-title";
  title.innerText = day + "曜日";

  dayDiv.appendChild(title);

  timetable[day].forEach((subject, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<div class="period">${i+1}限</div>${subject}`;
    dayDiv.appendChild(card);
  });

  content.appendChild(dayDiv);
}

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
