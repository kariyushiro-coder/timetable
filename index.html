<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

/* 全体横並び */
.wrapper {
  display: flex;
}

/* =========================
   左：時間列（完全固定）
========================= */
.time-column {
  width: 80px;
  min-width: 80px;
}

/* 1セル（左列） */
.time-cell {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #ddd;
  background: #eee;

  position: sticky;
  left: 0;
  z-index: 10;
}

/* =========================
   右：スクロール領域
========================= */
.scroll-area {
  overflow-x: auto;
  display: flex;
}

/* 各曜日列 */
.day-column {
  min-width: 120px;
}

/* 曜日タイトル */
.day-title {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  background: #f5f5f5;
  border: 1px solid #ddd;

  position: sticky;
  top: 0;
  z-index: 5;
}

/* 通常セル */
.cell {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #ddd;
}

/* 昼休み */
.lunch {
  background: #fff9c4;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- =========================
       左：時間列
  ========================= -->
  <div class="time-column" id="time"></div>

  <!-- =========================
       右：曜日
  ========================= -->
  <div class="scroll-area" id="days"></div>

</div>

<script>

const times = [
  "08:50",
  "10:30",
  "12:50",
  "16:10",
  "17:50",
  "19:30"
];

const days = ["月","火","水","木","金","土"];

const timetable = {
  "月": ["教職","","日本史","総合","",""],
  "火": ["教育","世界史","外書","","","アジア史"],
  "水": ["","地理","人文","","",""],
  "木": ["特別","地誌","史学展開","","","ICT教育"],
  "金": ["","","","","",""],
  "土": ["教育と社会","","","","",""]
};

/* =========================
   左：時間列生成
========================= */
const timeDiv = document.getElementById("time");

times.forEach((t, i) => {

  const div = document.createElement("div");
  div.className = "time-cell";

  // 昼休み差し込み
  if (i === 2) {
    div.innerText = "昼休み";
    div.classList.add("lunch");
  } else {
    div.innerText = t;
  }

  timeDiv.appendChild(div);
});

/* =========================
   右：曜日列生成
========================= */
const daysDiv = document.getElementById("days");

for (const day of days) {

  const col = document.createElement("div");
  col.className = "day-column";

  // タイトル
  const title = document.createElement("div");
  title.className = "day-title";
  title.innerText = day;
  col.appendChild(title);

  // 中身
  timetable[day].forEach(text => {

    const div = document.createElement("div");
    div.className = "cell";

    if (text === "") {
      div.innerText = "";
    } else {
      div.innerText = text;
    }

    col.appendChild(div);
  });

  daysDiv.appendChild(col);
}

</script>

</body>
</html>
