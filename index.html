<style>
body {
  margin: 0;
  font-family: sans-serif;
}

.container {
  overflow-x: auto;
}

/* ★gridやめて tableレイアウトに近い安定方式 */
.grid {
  display: grid;
  grid-template-columns: 80px repeat(6, 120px);
}

/* セル */
.cell {
  border: 1px solid #ddd;
  min-height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ★左固定列（これが本体） */
.time {
  background: #eee;
  position: sticky;
  left: 0;
  z-index: 10;
}

/* 曜日 */
.day-title {
  background: #f5f5f5;
  font-weight: bold;
}

/* 昼休み */
.lunch {
  grid-column: 2 / 8;
  background: #fff9c4;
  font-weight: bold;
  text-align: center;
}
</style>

<div class="container">
  <div class="grid" id="grid"></div>
</div>

<script>
const days = ["月","火","水","木","金","土"];

const periods = [
  { start: "08:50", type: "normal" },
  { start: "10:30", type: "normal" },
  { start: "昼休み", type: "lunch" },
  { start: "12:50", type: "normal" },
  { start: "16:10", type: "normal" },
  { start: "17:50", type: "normal" },
  { start: "19:30", type: "normal" }
];

const timetable = {
  "月": ["教職","","","日本史","総合","",""],
  "火": ["教育","世界史","外書","","","アジア史",""],
  "水": ["","地理","人文","","","",""],
  "木": ["特別","地誌","史学展開","","","日本時代","ICT教育"],
  "金": ["","","","","","",""],
  "土": ["教育と社会","","","","","",""]
};

const grid = document.getElementById("grid");

/* ヘッダー */
grid.appendChild(createCell("", "cell time"));
days.forEach(d => grid.appendChild(createCell(d, "cell day-title")));

/* 本体 */
periods.forEach((p, i) => {

  // 左列
  grid.appendChild(createCell(p.start, "cell time"));

  // 昼休み
  if (p.type === "lunch") {
    const lunch = createCell("12:50〜14:30", "cell lunch");
    grid.appendChild(lunch);
    return;
  }

  // 通常
  days.forEach(day => {
    grid.appendChild(createCell(timetable[day][i] || "", "cell"));
  });
});

function createCell(text, className) {
  const div = document.createElement("div");
  div.className = className;
  div.innerText = text;
  return div;
}
</script>
