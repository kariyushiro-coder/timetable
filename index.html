<!DOCTYPE html> <html> <head> <meta charset="UTF-8"> <title>時間割アプリ</title> <meta name="viewport" content="width=device-width, initial-scale=1"> <link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

/* 横スクロール領域 */
.container {
  overflow-x: auto;
  width: 100%;
}

/* 1行 */
.row {
  display: flex;
  width: max-content;
}

/* ★左列（完全固定） */
.time {
  width: 80px;
  min-width: 80px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #ddd;
  background: #eee;

  position: sticky;
  left: 0;
  z-index: 999; /* 最強にする */
}

/* 右側セル */
.cell {
  width: 120px;
  min-width: 120px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #ddd;
}

/* ヘッダー */
.header {
  background: #f5f5f5;
  font-weight: bold;
}

/* 昼休み */
.lunch {
  width: calc(120px * 6);
  min-width: calc(120px * 6);
  background: #fff9c4;
  font-weight: bold;
}
</style>

<div class="container" id="grid"></div>

<script>
const days = ["月","火","水","木","金","土"];

const times = [
  "08:50",
  "10:30",
  "12:50",
  "16:10",
  "17:50",
  "19:30"
];

const timetable = {
  "月": ["教職","","日本史","総合","",""],
  "火": ["教育","世界史","外書","","","アジア史"],
  "水": ["","地理","人文","","",""],
  "木": ["特別","地誌","史学展開","","","ICT教育"],
  "金": ["","","","","",""],
  "土": ["教育と社会","","","","",""]
};

const grid = document.getElementById("grid");

/* ===== ヘッダー ===== */
const header = document.createElement("div");
header.className = "row";

const empty = document.createElement("div");
empty.className = "time header";
empty.innerText = "";
header.appendChild(empty);

days.forEach(d => {
  const cell = document.createElement("div");
  cell.className = "cell header";
  cell.innerText = d;
  header.appendChild(cell);
});

grid.appendChild(header);

/* ===== 本体 ===== */
times.forEach((t, i) => {

  // 昼休み行
  if (i === 2) {
    const row = document.createElement("div");
    row.className = "row";

    const time = document.createElement("div");
    time.className = "time";
    time.innerText = "昼休み";
    row.appendChild(time);

    const lunch = document.createElement("div");
    lunch.className = "lunch cell";
    lunch.innerText = "12:50〜14:30";
    row.appendChild(lunch);

    grid.appendChild(row);
    return;
  }

  const row = document.createElement("div");
  row.className = "row";

  const time = document.createElement("div");
  time.className = "time";
  time.innerText = t;
  row.appendChild(time);

  days.forEach(d => {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.innerText = timetable[d][i > 2 ? i - 1 : i];
    row.appendChild(cell);
  });

  grid.appendChild(row);
});
</script>
