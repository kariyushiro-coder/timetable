<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割（Excel型）</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

/* ===== 表全体 ===== */
.grid {
  display: grid;
  grid-template-columns: 80px repeat(6, 120px);
}

/* セル共通 */
.cell {
  border: 1px solid #ddd;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 左上空白 */
.corner {
  background: #eee;
  position: sticky;
  top: 0;
  left: 0;
  z-index: 3;
}

/* 曜日ヘッダー（上固定） */
.header {
  background: #f5f5f5;
  font-weight: bold;

  position: sticky;
  top: 0;
  z-index: 2;
}

/* 時間列（左固定） */
.time {
  background: #eee;

  position: sticky;
  left: 0;
  z-index: 1;
}

/* 今日ハイライト */
.today {
  background: #ffe0b2;
  font-weight: bold;
}

/* 今の時間 */
.now {
  background: #ffccbc;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="grid" id="grid"></div>

<script>

const days = ["月","火","水","木","金","土"];

const times = ["8:30","9:30","10:30","11:30","12:30","13:30"];

const timetable = {
  "月": ["数","英","理","社","体","音"],
  "火": ["英","数","理","美","体","国"],
  "水": ["理","社","数","英","体","技"],
  "木": ["国","英","数","理","体","音"],
  "金": ["数","理","英","社","体","美"],
  "土": ["自","自","自","自","自","自"]
};

const grid = document.getElementById("grid");

/* ======================
1行目（曜日ヘッダー）
====================== */

// 左上空白
grid.appendChild(make("corner",""));

// 曜日
days.forEach(d => {
  const cell = make("cell header", d);
  grid.appendChild(cell);
});

/* ======================
時間 + 授業
====================== */

const todayIndex = new Date().getDay();
const dayMap = ["日","月","火","水","木","金","土"];
const today = dayMap[todayIndex];

function getNowIndex() {
  const h = new Date().getHours();
  const m = new Date().getMinutes();
  const t = h*60+m;

  const range = [
    [8*60+30, 9*60+30],
    [9*60+30,10*60+30],
    [10*60+30,11*60+30],
    [11*60+30,12*60+30],
    [12*60+30,13*60+30],
    [13*60+30,14*60+30],
  ];

  for (let i=0;i<range.length;i++){
    if(t>=range[i][0] && t<range[i][1]) return i;
  }
  return -1;
}

const nowIndex = getNowIndex();

/* 行生成 */
for (let i=0;i<times.length;i++){

  // 時間
  const tcell = make("cell time", times[i]);
  grid.appendChild(tcell);

  // 各曜日
  days.forEach(d => {

    const val = timetable[d][i];

    const cell = make("cell", val);

    // 今日＋現在時刻ハイライト
    if (d === today && i === nowIndex) {
      cell.classList.add("now");
    }

    if (d === today) {
      cell.classList.add("today");
    }

    grid.appendChild(cell);
  });
}

/* 作成関数 */
function make(cls, text){
  const div = document.createElement("div");
  div.className = cls;
  div.innerText = text;
  return div;
}

</script>

</body>
</html>
