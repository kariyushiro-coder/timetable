<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

/* 全体 */
.wrapper {
  display: flex;
}

/* 左列（固定） */
.time-column {
  background: #eee;
  flex-shrink: 0;
}

.time-cell {
  height: 50px;
  width: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #ddd;
  position: sticky;
  left: 0;
  background: #eee;
}

/* 右側スクロール */
.scroll-area {
  overflow-x: auto;
  display: flex;
}

/* 曜日列 */
.day-column {
  min-width: 120px;
}

.day-title {
  height: 50px;
  background: #f5f5f5;
  font-weight: bold;
  text-align: center;
  border: 1px solid #ddd;
}

/* セル */
.cell {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #ddd;
}

/* 昼休み */
.lunch {
  background: #fff9c4;
  font-weight: bold;
}

/* 今日 */
.today {
  background: #ffe0b2;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- 左（時間固定） -->
  <div class="time-column" id="time"></div>

  <!-- 右（スクロール） -->
  <div class="scroll-area" id="days"></div>

</div>

<script>

const times = [
  "8:30",
  "10:30",
  "12:50",
  "昼休み",
  "16:10",
  "17:50",
  "19:30"
];

const timetable = {
  "月": ["教職","","日本史","","総合","",""],
  "火": ["教育","世界史","外書","","アジア史","",""],
  "水": ["","地理","人文","","","",""],
  "木": ["特別","地誌","史学展開","","日本時代","",""],
  "金": ["","","","","","",""],
  "土": ["教育","","","","","",""]
};

const days = Object.keys(timetable);

const timeDiv = document.getElementById("time");
const daysDiv = document.getElementById("days");

const todayIndex = new Date().getDay();
const dayMap = ["日","月","火","水","木","金","土"];
const today = dayMap[todayIndex];

/* ===== 左列 ===== */
times.forEach(t => {
  const div = document.createElement("div");
  div.className = "time-cell";
  div.innerText = t;
  timeDiv.appendChild(div);
});

/* ===== 右側 ===== */
days.forEach(day => {

  const col = document.createElement("div");
  col.className = "day-column";

  const title = document.createElement("div");
  title.className = "day-title";
  if (day === today) title.classList.add("today");
  title.innerText = day;

  col.appendChild(title);

  timetable[day].forEach(sub => {
    const div = document.createElement("div");
    div.className = "cell";
    div.innerText = sub;
    col.appendChild(div);
  });

  daysDiv.appendChild(col);
});

</script>

</body>
</html>
