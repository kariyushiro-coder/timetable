<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>前期時間割</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg-1: #eef7ee;
  --bg-2: #dfeedd;
  --card: rgba(255,255,255,0.74);
  --line: #d4e4d0;
  --text: #2f4330;

  --forest-1: #6ea56d;
  --forest-2: #4f7f51;
  --forest-3: #355d39;

  --today: #e2f3dc;
  --now: #5f8f57;
  --now-text: #ffffff;

  --time-bg: #edf5ea;
  --head-bg: #f3faf1;
  --title-bg: #dcefd7;

  --lunch-main: #eef6c8;
  --lunch-merge: #ffffff;

  --pill-bg: #ffffff;
  --pill-line: #d6e4d2;
  --pill-shadow: 0 4px 10px rgba(53, 94, 59, 0.08);

  --shadow-lg: 0 16px 40px rgba(43, 75, 47, 0.16);
}

body {
  margin: 0;
  font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(126, 179, 118, 0.20), transparent 28%),
    radial-gradient(circle at top right, rgba(95, 143, 87, 0.14), transparent 22%),
    linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
}

.app {
  max-width: 1100px;
  margin: 18px auto;
  padding: 12px;
}

.app-shell {
  background: var(--card);
  backdrop-filter: blur(10px);
  border-radius: 24px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}

.hero {
  padding: 18px;
  background: linear-gradient(135deg, rgba(110,165,109,0.95), rgba(79,127,81,0.95));
  color: #fff;
}

.table-wrap {
  padding: 12px;
  overflow-x: auto;
  overflow-y: visible;
  -webkit-overflow-scrolling: touch;
}

table {
  border-collapse: separate;
  border-spacing: 0;
  min-width: 820px;
  transform-origin: top left;
}

th, td {
  width: 120px;
  height: 54px;
  text-align: center;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  background: rgba(255,255,255,0.86);
}

/* 左固定 */
.corner,
.time-col,
.lunch-time {
  width: 92px;
  min-width: 92px;
  position: sticky;
  left: 0;
  background: var(--time-bg);
  z-index: 4;
}

.today {
  background: var(--today) !important;
}

.now {
  background: var(--now) !important;
  color: #fff;
}

/* ===== スマホ調整（ここ重要）===== */
@media screen and (max-width: 600px) {
  th, td {
    width: 56px;   /* ← 修正 */
    height: 40px;
    font-size: 9px;
  }

  .corner,
  .time-col,
  .lunch-time {
    width: 42px;   /* ← 修正 */
    min-width: 42px;
  }
}
</style>
</head>

<body>

<div class="app">
  <div class="app-shell">
    <div class="hero">前期時間割</div>

    <div class="table-wrap wrap">
      <table id="timetable"></table>
    </div>

  </div>
</div>

<script>
const days = ["月","火","水","木","金","土"];

const rows = [
  { type: "class", time: "1限\n8:30", key: 0 },
  { type: "class", time: "2限\n10:30", key: 1 },
  { type: "class", time: "3限\n12:50", key: 2 },
  { type: "lunch", time: "昼休み", label: "12:50〜14:30" },
  { type: "class", time: "4限\n16:10", key: 3 },
  { type: "class", time: "5限\n17:50", key: 4 },
  { type: "class", time: "6限\n19:30", key: 5 }
];

const timetable = {
  "月": ["教職","","日本史","総合","",""],
  "火": ["教育","世界史","外書","","アジア史",""],
  "水": ["","地理","人文","","",""],
  "木": ["特別","地誌","史学展開","","日本時代","ICT教育"],
  "金": ["","","","","",""],
  "土": ["教育","","","","",""]
};

const todayIndex = new Date().getDay();
const dayMap = ["日","月","火","水","木","金","土"];
const today = dayMap[todayIndex];
const todayIndexInWeek = Math.max(0, days.indexOf(today));

const table = document.getElementById("timetable");

/* ヘッダー */
const header = document.createElement("tr");
const corner = document.createElement("th");
corner.className="corner";
corner.textContent="開始\n時刻";
header.appendChild(corner);

days.forEach(d=>{
  const th=document.createElement("th");
  th.textContent=d;
  if(d===today) th.classList.add("today");
  header.appendChild(th);
});
table.appendChild(header);

/* 本体 */
rows.forEach(r=>{
  const tr=document.createElement("tr");

  const th=document.createElement("th");
  th.className="time-col";
  th.textContent=r.time;
  tr.appendChild(th);

  if(r.type==="lunch"){
    const td=document.createElement("td");
    td.colSpan=6;
    td.textContent=r.label;
    tr.appendChild(td);
    table.appendChild(tr);
    return;
  }

  days.forEach(d=>{
    const td=document.createElement("td");
    td.textContent=timetable[d][r.key]||"";
    if(d===today) td.classList.add("today");
    tr.appendChild(td);
  });

  table.appendChild(tr);
});

/* ===== 縦表示改善（ここ重要）===== */
function positionPortrait() {
  const wrap = document.querySelector(".wrap");
  if (!wrap) return;

  if (window.innerHeight > window.innerWidth) {
    const leftColWidth = 42;
    const dayColWidth = 56;

    const todayLeft = leftColWidth + (todayIndexInWeek * dayColWidth);

    // 今日を左寄りに
    wrap.scrollLeft = Math.max(0, todayLeft - 10);
  }
}

window.addEventListener("load", positionPortrait);
window.addEventListener("resize", positionPortrait);
</script>

</body>
</html>
