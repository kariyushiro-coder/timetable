<style>
body {
  margin: 0;
  font-family: sans-serif;
}

header {
  background: #2196f3;
  color: white;
  padding: 15px;
  text-align: center;
}

/* 横スクロール */
.container {
  overflow-x: auto;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: 80px repeat(6, 120px);
  min-width: 800px;
}

/* セル */
.cell {
  border: 1px solid #ddd;
  min-height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
  padding: 5px;
}

/* 時間固定 */
.time {
  position: sticky;
  left: 0;
  background: #eee;
  z-index: 2;
}

/* 曜日 */
.day-title {
  background: #f5f5f5;
  font-weight: bold;

  position: sticky;
  top: 0;
  z-index: 3;
}

/* 昼休み */
.lunch {
  grid-column: 1 / -1;
  background: #fff9c4;
  font-weight: bold;
}

/* 今日 */
.today {
  border: 3px solid #ff9800;
}

/* 今の授業 */
.now {
  border: 3px solid #ff5722;
  font-weight: bold;
}
</style>

<div class="container">
  <div class="grid" id="grid"></div>
</div>
