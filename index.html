<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

/* 横並び */
.wrapper {
  display: flex;
}

/* 左固定 */
.left {
  width: 80px;
  flex-shrink: 0;
  background: #eee;
}

.left div {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #ddd;
}

/* 右スクロール */
.right {
  overflow-x: auto;
}

/* 1行 */
.row {
  display: flex;
}

/* 曜日 */
.day {
  width: 120px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #ddd;
  background: #f5f5f5;
  font-weight: bold;
}

/* セル */
.cell {
  width: 120px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #ddd;
}

/* 昼休み */
.lunch-left {
  width: 80px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #eee;
  border: 1px solid #ddd;
}

.lunch-right {
  width: 720px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff9c4;
  border: 1px solid #ddd;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="wrapper">

  <!-- 左固定 -->
  <div class="left" id="time"></div>

  <!-- 右スクロール -->
  <div class="right" id="table"></div>

</div>

<script>

const times = [
  "8:30",
  "10:30",
  "12:50",
  "昼休み",
  "16:10",
  "17:50",
  "19:30"
];

const days = ["月","火","水","木","金","土"];

const timetable = {
  "月": ["教職","","日本史","総合","","",""],
  "火": ["教育","世界史","外書","","アジア史","",""],
  "水": ["","地理","人文","","","",""],
  "木": ["特別","地誌","史学展開","","日本時代","",""],
  "金": ["","","","","",""],
  "土": ["教育","","","","",""]
};

const timeDiv = document.getElementById("time");
const tableDiv = document.getElementById("table");

/* 左列 */
times.forEach(t => {
  const div = document.createElement("div");
  div.innerText = t;
  timeDiv.appendChild(div);
});

/* 右側 */
for (let i = 0; i < times.length; i++) {

  // 昼休み行
  if (i === 3) {
    const row = document.createElement("div");
    row.className = "row";

    const left = document.createElement("div");
    left.className = "lunch-left";
    left.innerText = "昼休み";

    const right = document.createElement("div");
    right.className = "lunch-right";
    right.innerText = "12:50〜14:30";

    row.appendChild(left);
    row.appendChild(right);

    tableDiv.appendChild(row);
    continue;
  }

  const row = document.createElement("div");
  row.className = "row";

  days.forEach(d => {
    const div = document.createElement("div");
    div.className = "cell";
    div.innerText = timetable[d][i > 3 ? i - 1 : i] || "";
    row.appendChild(div);
  });

  tableDiv.appendChild(row);
}

</script>

</body>
</html>
