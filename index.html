<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

/* 横スクロール */
.wrap {
  overflow-x: auto;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: 80px repeat(6, 120px);
  min-width: max-content;
}

/* 基本セル */
.cell {
  border: 1px solid #ddd;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ★左列固定（最重要） */
.fixed-left {
  position: sticky;
  left: 0;
  background: #eee;
  z-index: 10;
}

/* 曜日ヘッダー */
.header {
  position: sticky;
  top: 0;
  background: #f5f5f5;
  font-weight: bold;
  z-index: 5;
}

/* 今日 */
.today {
  background: #ffe0b2;
  font-weight: bold;
}

/* 昼休み */
.lunch-row {
  background: #fff9c4;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="grid" id="grid"></div>
</div>

<script>

const days = ["月","火","水","木","金","土"];

const times = [
  "8:30",
  "10:30",
  "12:50",
  "16:10",
  "17:50",
  "19:30"
];

const timetable = {
  "月": ["教職","","日本史","総合","",""],
  "火": ["教育","世界史","外書","","アジア史",""],
  "水": ["","地理","人文","","",""],
  "木": ["特別","地誌","史学展開","","日本時代","ICT"],
  "金": ["","","","","",""],
  "土": ["教育","","","","",""]
};

const grid = document.getElementById("grid");

const todayIndex = new Date().getDay();
const dayMap = ["日","月","火","水","木","金","土"];
const today = dayMap[todayIndex];

/* =====================
ヘッダー
===================== */

// 左上
grid.appendChild(make("cell fixed-left header", ""));

// 曜日
days.forEach(d => {
  const c = make("cell header", d);
  if (d === today) c.classList.add("today");
  grid.appendChild(c);
});

/* =====================
本体
===================== */

for (let i = 0; i < times.length; i++) {

  // ★左列（絶対固定）
  const timeCell = make("cell fixed-left", times[i]);
  grid.appendChild(timeCell);

  // ★授業列
  days.forEach(d => {
    const c = make("cell", timetable[d][i] || "");
    if (d === today) c.classList.add("today");
    grid.appendChild(c);
  });

}

/* 作成 */
function make(cls, text){
  const div = document.createElement("div");
  div.className = cls;
  div.innerText = text;
  return div;
}

</script>

</body>
</html>
