<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

header {
  background: #2196f3;
  color: white;
  padding: 15px;
  text-align: center;
}

/* ★グリッド */
.grid {
  display: grid;
  grid-template-columns: 80px repeat(6, 1fr);
}

/* 共通セル */
.cell {
  border: 1px solid #ddd;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
}

/* 曜日 */
.day-title {
  font-weight: bold;
  background: #f5f5f5;
}

/* 時間 */
.time {
  background: #eee;
}

/* 昼休み */
.lunch {
  background: #fff9c4;
  font-weight: bold;
  grid-column: 1 / -1; /* ★全幅 */
}

/* 今日 */
.today {
  border: 3px solid #ff9800;
}

/* 今の授業 */
.now {
  border: 3px solid #ff5722;
  font-weight: bold;
}
</style>
</head>

<body>

<header>時間割</header>

<div class="grid" id="grid"></div>

<script>
const todayIndex = new Date().getDay();
const dayMap = ["日","月","火","水","木","金","土"];
const today = dayMap[todayIndex];

const periods = [
  { start: "08:50", end: "10:20" },
  { start: "10:30", end: "12:00" },
  { start: "12:50", end: "14:20" },
  { start: "14:30", end: "16:00" },
  { start: "16:10", end: "17:40" },
  { start: "17:50", end: "19:20" },
  { start: "19:30", end: "21:00" }
];

function getCurrentPeriod() {
  const now = new Date();
  const current = now.getHours() * 60 + now.getMinutes();

  for (let i = 0; i < periods.length; i++) {
    const [sh, sm] = periods[i].start.split(":").map(Number);
    const [eh, em] = periods[i].end.split(":").map(Number);

    const start = sh * 60 + sm;
    const end = eh * 60 + em;

    if (current >= start && current <= end) {
      return i;
    }
  }
  return -1;
}

const timetable = {
  "月": ["教職","","","日本史","総合","",""],
  "火": ["教育","世界史","外書","","","アジア史",""],
  "水": ["","地理","人文","","","",""],
  "木": ["特別","地誌","史学展開","","","日本時代","ICT教育"],
  "金": ["","","","","","",""],
  "土": ["教育と社会","","","","","",""]
};

const grid = document.getElementById("grid");
const days = ["月","火","水","木","金","土"];
const current = getCurrentPeriod();

/* ===== 1行目（曜日） ===== */
grid.appendChild(createCell("", "cell"));

days.forEach(day => {
  const c = createCell(day, "cell day-title");
  if (day === today) c.classList.add("today");
  grid.appendChild(c);
});

/* ===== 各時限 ===== */
periods.forEach((p, i) => {

  // 時間
  grid.appendChild(createCell(p.start, "cell time"));

  // 各曜日
  days.forEach(day => {
    const sub = timetable[day][i];
    const c = createCell(sub, "cell");

    if (day === today && i === current) {
      c.classList.add("now");
    }

    grid.appendChild(c);
  });

  // ★3限のあとに昼休み（1行）
  if (i === 2) {
    const lunch = createCell("昼休み", "cell lunch");
    grid.appendChild(lunch);
  }
});

/* ===== 関数 ===== */
function createCell(text, className) {
  const div = document.createElement("div");
  div.className = className;
  div.innerText = text;
  return div;
}
</script>

</body>
</html>
