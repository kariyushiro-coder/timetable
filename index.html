<style>
body {
  margin: 0;
  font-family: sans-serif;
}

/* ★横スクロール */
.container {
  overflow-x: auto;
}

/* ★テーブル化（これが一番安定） */
.table {
  display: table;
  border-collapse: collapse;
  min-width: 100%;
}

/* 行 */
.row {
  display: table-row;
}

/* セル */
.cell {
  display: table-cell;
  border: 1px solid #ddd;
  min-width: 120px;
  height: 50px;
  text-align: center;
  vertical-align: middle;
}

/* ★左列固定 */
.time {
  position: sticky;
  left: 0;
  background: #eee;
  z-index: 10;
  min-width: 80px;
}

/* ★上固定（曜日） */
.header {
  position: sticky;
  top: 0;
  background: #f5f5f5;
  z-index: 5;
}

/* 昼休み */
.lunch {
  background: #fff9c4;
  font-weight: bold;
}
</style>

<div class="container">
  <div class="table" id="grid"></div>
</div>

<script>
const days = ["月","火","水","木","金","土"];

const periods = [
  { start: "08:50" },
  { start: "10:30" },
  { start: "昼休み", lunch: true },
  { start: "12:50" },
  { start: "16:10" },
  { start: "17:50" },
  { start: "19:30" }
];

const timetable = {
  "月": ["教職","","","日本史","総合","",""],
  "火": ["教育","世界史","外書","","","アジア史",""],
  "水": ["","地理","人文","","","",""],
  "木": ["特別","地誌","史学展開","","","日本時代","ICT教育"],
  "金": ["","","","","","",""],
  "土": ["教育と社会","","","","","",""]
};

const todayIndex = new Date().getDay();
const dayMap = ["日","月","火","水","木","金","土"];
const today = dayMap[todayIndex];

const grid = document.getElementById("grid");

/* ===== ヘッダー ===== */
const headerRow = document.createElement("div");
headerRow.className = "row";

headerRow.appendChild(makeCell("", "cell time header"));

days.forEach(d => {
  const c = makeCell(d, "cell header");
  if (d === today) c.style.background = "#ffe0b2";
  headerRow.appendChild(c);
});

grid.appendChild(headerRow);

/* ===== 本体 ===== */
periods.forEach((p, i) => {

  const row = document.createElement("div");
  row.className = "row";

  // 左固定列
  row.appendChild(makeCell(p.start, "cell time"));

  // 昼休み
  if (p.lunch) {
    const lunch = makeCell("12:50〜14:30", "cell lunch");
    lunch.style.textAlign = "center";
    lunch.colSpan = 6;
    row.appendChild(lunch);
    grid.appendChild(row);
    return;
  }

  // 授業
  days.forEach(day => {
    row.appendChild(makeCell(timetable[day][i] || "", "cell"));
  });

  grid.appendChild(row);
});

function makeCell(text, className) {
  const div = document.createElement("div");
  div.className = className;
  div.innerText = text;
  return div;
}
</script>
