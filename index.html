<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

.wrap {
  overflow-x: auto;
}

.grid {
  display: grid;
  grid-template-columns: 80px repeat(6, 120px);
}

/* セル */
.cell {
  border: 1px solid #ddd;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 左列固定 */
.fixed-left {
  position: sticky;
  left: 0;
  background: #eee;
  z-index: 10;
}

/* 曜日 */
.header {
  background: #f5f5f5;
  font-weight: bold;
  position: sticky;
  top: 0;
  z-index: 5;
}

/* 今日 */
.today {
  background: #ffe0b2;
  font-weight: bold;
}

/* 昼休み */
.lunch {
  grid-column: 2 / 8;
  background: #fff9c4;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="grid" id="grid"></div>
</div>

<script>

const days = ["月","火","水","木","金","土"];

const rows = [
  { time: "8:30" },
  { time: "10:30" },
  { lunch: true },
  { time: "12:50" },
  { time: "16:10" },
  { time: "17:50" },
  { time: "19:30" }
];

const timetable = {
  "月": ["教職","","日本史","総合","","",""],
  "火": ["教育","世界史","外書","","アジア史","",""],
  "水": ["","地理","人文","","","",""],
  "木": ["特別","地誌","史学展開","","日本時代","",""],
  "金": ["","","","","","",""],
  "土": ["教育","","","","","",""]
};

const grid = document.getElementById("grid");

const todayIndex = new Date().getDay();
const dayMap = ["日","月","火","水","木","金","土"];
const today = dayMap[todayIndex];

/* ===== ヘッダー ===== */
grid.appendChild(make("cell fixed-left header",""));

days.forEach(d => {
  const c = make("cell header", d);
  if (d === today) c.classList.add("today");
  grid.appendChild(c);
});

/* ===== 本体 ===== */
let dataIndex = 0;

for (let i = 0; i < rows.length; i++) {

  /* 左列 */
  const left = make("cell fixed-left", rows[i].time || "昼休み");
  grid.appendChild(left);

  /* 昼休み行 */
  if (rows[i].lunch) {

    const lunch = make("cell lunch", "12:50〜14:30");
    grid.appendChild(lunch);

    continue;
  }

  /* 授業行 */
  days.forEach(d => {
    const c = make("cell", timetable[d][dataIndex] || "");
    if (d === today) c.classList.add("today");
    grid.appendChild(c);
  });

  dataIndex++;
}

function make(cls, text){
  const div = document.createElement("div");
  div.className = cls;
  div.innerText = text;
  return div;
}

</script>

</body>
</html>
