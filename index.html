<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: sans-serif;
}
  
 *{
  box-sizing: border-box;
}
header {
  background: #2196f3;
  color: white;
  padding: 15px;
  text-align: center;
}

/* 全体 */
.wrapper {
  display: flex;
}

/* 左（時間）固定 */
.time-column {
  background: #eee;
  padding: 0;
}

.time-cell {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 右（スクロール） */
.scroll-area {
  overflow-x: auto;
  display: flex;
}

.day-column {
  min-width: 120px;
}

.day-title {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  padding: 10px;
  background: #f5f5f5;
}

.cell {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #ddd;
  white-space: nowrap;
}
</style>
</head>

<body>

<header>時間割</header>

<div class="wrapper">

  <!-- 時間（固定） -->
  <div class="time-column" id="time"></div>

  <!-- 曜日（スクロール） -->
  <div class="scroll-area" id="days"></div>

</div>

<script>
const todayIndex = new Date().getDay(); // 0=日
const dayMap = ["日","月","火","水","木","金","土"];
const today = dayMap[todayIndex];
  
  const periods = [
  { start: "08:50", end: "10:20" },
  { start: "10:30", end: "12:00" },
  { start: "12:50", end: "14:20" },
  { start: "14:30", end: "16:00" },
  { start: "16:10", end: "17:40" },
  { start: "17:50", end: "19:20" },
  { start: "19:30", end: "21:00" }
];

function getCurrentPeriod() {
  const now = new Date();
  const current = now.getHours() * 60 + now.getMinutes();

  for (let i = 0; i < periods.length; i++) {
    const [sh, sm] = periods[i].start.split(":").map(Number);
    const [eh, em] = periods[i].end.split(":").map(Number);

    const start = sh * 60 + sm;
    const end = eh * 60 + em;

    if (current >= start && current <= end) {
      return i;
    }
  }
  return -1;
}
  
const timetable = {
  "月": ["教職","","","日本史","総合","",""],
  "火": ["教育","世界史","外書","","","アジア史",""],
  "水": ["","地理","人文","","","",""],
  "木": ["特別","地誌","史学展開","","","日本時代","ICT教育"],
  "金": ["","","","","","",""],
  "土": ["教育と社会","","","","","",""]
};

// 時間列
const timeDiv = document.getElementById("time");

const spacer = document.createElement("div");
spacer.className = "time-cell";
spacer.innerText = ""; // 空でOK
timeDiv.appendChild(spacer);
  
periods.forEach((p, i) => {
  const div = document.createElement("div");
  div.className = "time-cell";
  div.innerText = p.start;                           
  timeDiv.appendChild(div);

  // ★3限のあとに昼休み
  if (i === 2) {
    const lunch = document.createElement("div");
    lunch.className = "time-cell";
    lunch.innerText = "昼休み";
    lunch.style.background = "#ffe082";
    timeDiv.appendChild(lunch);
  }
});

// 曜日列
const daysDiv = document.getElementById("days");

for (const day in timetable) {

  const col = document.createElement("div");
  col.className = "day-column";

  const title = document.createElement("div");
  title.className = "day-title";
  title.innerText = day;

  // ★ここに移動！！
  if (day === today) {
    title.style.border = "3px solid #ff9800";
    title.style.borderRadius = "8px";
  }

  col.appendChild(title);

  const current = getCurrentPeriod();

  timetable[day].forEach((sub, i) => {
  const div = document.createElement("div");
  div.className = "cell";
  div.innerText = sub;

  if (day === today && i === current) {
    div.style.border = "3px solid #ff5722";
    div.style.fontWeight = "bold"; 
  }

  col.appendChild(div);

  // ★これ追加（3限のあと）
  if (i === 2) {
    const lunch = document.createElement("div");
    lunch.className = "cell";
    lunch.innerText = "昼休み";
    lunch.style.background = "#fff9c4";
    lunch.style.fontWeight = "bold"; 
    lunch.style.border = "2px dashed #ff9800";
    col.appendChild(lunch);
  }
});

  daysDiv.appendChild(col);
}
// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
