<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

/* ロック画面 */
#lockScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
}

.lock-box {
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
  text-align: center;
  width: 80%;
  max-width: 300px;
}

input {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #2196f3;
  color: white;
}

.error {
  color: red;
}

/* アプリ本体 */
#app {
  display: none;
  padding: 20px;
}
</style>
</head>

<body>

<div id="lockScreen">
  <div class="lock-box">
    <h2>🔒 パスワード入力</h2>
    <input type="password" id="password" placeholder="パスワード">
    <button onclick="unlock()">ログイン</button>
    <div id="error" class="error"></div>
  </div>
</div>

<div id="app">
  <h1>時間割</h1>
  <ul>
    <li>1限：数学</li>
    <li>2限：英語</li>
    <li>3限：理科</li>
  </ul>
</div>

<script>
const correctPassword = "1234"; // ←変更OK

if (localStorage.getItem("auth") === "ok") {
  showApp();
}

function unlock() {
  const input = document.getElementById("password").value;

  if (input === correctPassword) {
    localStorage.setItem("auth", "ok");
    showApp();
  } else {
    document.getElementById("error").innerText = "パスワードが違います";
  }
}

function showApp() {
  document.getElementById("lockScreen").style.display = "none";
  document.getElementById("app").style.display = "block";
}

// Service Worker登録
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
