<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

.wrap {
  overflow-x: auto;
  overflow-y: hidden;
}

table {
  border-collapse: collapse;
  table-layout: fixed;
  min-width: 800px;
  background: #fff;
  transform-origin: top left;
}

th, td {
  border: 1px solid #ccc;
  width: 120px;
  height: 50px;
  text-align: center;
  vertical-align: middle;
  padding: 0;
  box-sizing: border-box;
  white-space: nowrap;
}

/* 左上 */
.corner {
  width: 80px;
  min-width: 80px;
  background: #eee;
  position: sticky;
  left: 0;
  z-index: 4;
}

/* 時間列 */
.time-col {
  width: 80px;
  min-width: 80px;
  background: #eee;
  position: sticky;
  left: 0;
  z-index: 3;
}

/* 曜日ヘッダー */
.day-head {
  background: #f5f5f5;
  font-weight: bold;
  position: sticky;
  top: 50px;
  z-index: 2;
}

/* 今日 */
.today {
  background: #ffe0b2;
}

/* 今の授業 */
.now {
  background: #ffccbc;
  box-shadow: inset 0 0 0 2px #ff5722;
  font-weight: bold;
}

/* 昼休み左 */
.lunch-time {
  width: 80px;
  min-width: 80px;
  background: #eee;
  position: sticky;
  left: 0;
  z-index: 3;
  font-weight: bold;
}

/* 昼休み右 */
.lunch-main {
  background: #fff9c4;
  font-weight: bold;
}

.lunch-merge {
  background: #ffffff;
}

/* タイトル行 */
.title-row th {
  background: #e3f2fd;
  border-left: none;
  border-right: none;
}

/* 自動調整をなめらかに */
.fit-target th,
.fit-target td {
  transition: height 0.2s, font-size 0.2s, width 0.2s, min-width 0.2s;
}

/* スマホ基本調整 */
@media screen and (max-width: 600px) {
  th, td {
    width: 85px;
    font-size: 12px;
  }

  .time-col,
  .corner,
  .lunch-time {
    width: 60px;
    min-width: 60px;
    font-size: 12px;
  }

  .day-head {
    font-size: 13px;
  }
}
  .time-col {
  white-space: pre-line;
  font-size: 12px;
  line-height: 1.2;
}
</style>
</head>

<body>

<div class="wrap">
  <table id="timetable"></table>
</div>

<script>
const days = ["月","火","水","木","金","土"];

const rows = [
  { type: "class", time: "1限\n8:30",  key: 0 },
  { type: "class", time: "2限\n10:30", key: 1 },
  { type: "class", time: "3限\n12:50", key: 2 },
  { type: "lunch", time: "昼休み", label: "12:50〜14:30" },
  { type: "class", time: "4限\n16:10", key: 3 },
  { type: "class", time: "5限\n17:50", key: 4 },
  { type: "class", time: "6限\n19:30", key: 5 }
];

const timetable = {
  "月": ["教職", "", "日本史", "総合", "", ""],
  "火": ["教育", "世界史", "外書", "", "アジア史", ""],
  "水": ["", "地理", "人文", "", "", ""],
  "木": ["特別", "地誌", "史学展開", "", "日本時代", "ICT教育"],
  "金": ["", "", "", "", "", ""],
  "土": ["教育", "", "", "", "", ""]
};

const todayIndex = new Date().getDay();
const dayMap = ["日","月","火","水","木","金","土"];
const today = dayMap[todayIndex];

/* 日曜なら -1 になるので 0 にして崩れ防止 */
const todayIndexInWeek = Math.max(0, days.indexOf(today));

function getCurrentClassIndex() {
  const now = new Date();
  const minutes = now.getHours() * 60 + now.getMinutes();

  const ranges = [
    [8 * 60 + 30, 10 * 60 + 29],
    [10 * 60 + 30, 12 * 60 + 29],
    [12 * 60 + 50, 14 * 60 + 29],
    [16 * 60 + 10, 17 * 60 + 49],
    [17 * 60 + 50, 19 * 60 + 29],
    [19 * 60 + 30, 21 * 60 + 0]
  ];

  for (let i = 0; i < ranges.length; i++) {
    if (minutes >= ranges[i][0] && minutes <= ranges[i][1]) {
      return i;
    }
  }
  return -1;
}

const nowIndex = getCurrentClassIndex();
const table = document.getElementById("timetable");

/* タイトル行 */
const titleTr = document.createElement("tr");
titleTr.className = "title-row";

const titleTh = document.createElement("th");
titleTh.className = "corner";
titleTh.textContent = "";
titleTr.appendChild(titleTh);

// 今日より前は空白
for (let i = 0; i < todayIndexInWeek; i++) {
  const empty = document.createElement("th");
  empty.textContent = "";
  titleTr.appendChild(empty);
}

// 今日の曜日の位置にタイトル
const titleMain = document.createElement("th");
titleMain.className = "lunch-main";
titleMain.textContent = "前期時間割";
titleMain.style.textAlign = "center";
titleMain.style.fontWeight = "bold";
titleMain.style.background = "#e3f2fd";
titleTr.appendChild(titleMain);

// 今日より後を結合
const titleRemain = 5 - todayIndexInWeek;
if (titleRemain > 0) {
  const titleMerged = document.createElement("th");
  titleMerged.className = "lunch-merge";
  titleMerged.colSpan = titleRemain;
  titleMerged.textContent = "";
  titleMerged.style.background = "#e3f2fd";
  titleTr.appendChild(titleMerged);
}

table.appendChild(titleTr);

/* ヘッダー */
const headerTr = document.createElement("tr");

const corner = document.createElement("th");
corner.className = "corner";
corner.textContent = "";
headerTr.appendChild(corner);

days.forEach(day => {
  const th = document.createElement("th");
  th.className = "day-head";
  if (day === today) th.classList.add("today");
  th.textContent = day;
  headerTr.appendChild(th);
});

table.appendChild(headerTr);

/* 本体 */
rows.forEach(row => {
  const tr = document.createElement("tr");

  if (row.type === "lunch") {
    const th = document.createElement("th");
    th.className = "lunch-time";
    th.textContent = row.time;
    tr.appendChild(th);

    // 今日より前は空白
    for (let i = 0; i < todayIndexInWeek; i++) {
      const empty = document.createElement("td");
      empty.textContent = "";
      tr.appendChild(empty);
    }

    // 今日の曜日のセル
    const main = document.createElement("td");
    main.className = "lunch-main";
    main.textContent = row.label;
    tr.appendChild(main);

    // 今日より後を結合
    const remain = 5 - todayIndexInWeek;
    if (remain > 0) {
      const merged = document.createElement("td");
      merged.className = "lunch-merge";
      merged.colSpan = remain;
      merged.textContent = "";
      tr.appendChild(merged);
    }

    table.appendChild(tr);
    return;
  }

  const th = document.createElement("th");
  th.className = "time-col";
  th.textContent = row.time;
  tr.appendChild(th);

  days.forEach(day => {
    const td = document.createElement("td");
    td.textContent = timetable[day][row.key] || "";

    if (day === today) td.classList.add("today");
    if (day === today && row.key === nowIndex) td.classList.add("now");

    tr.appendChild(td);
  });

  table.appendChild(tr);
});

/* 今日の列を最初から中央付近に表示 */
window.addEventListener("load", () => {
  const wrap = document.querySelector(".wrap");
  const headers = document.querySelectorAll(".day-head");
  const todayHeader = headers[todayIndexInWeek];

  if (wrap && todayHeader) {
    const wrapRect = wrap.getBoundingClientRect();
    const cellRect = todayHeader.getBoundingClientRect();

    const targetScroll =
      wrap.scrollLeft +
      (cellRect.left - wrapRect.left) -
      (wrap.clientWidth / 2) +
      (cellRect.width / 2);

    wrap.scrollLeft = Math.max(0, targetScroll);
  }

  fitTableToScreen();
});

/* 1画面に収める自動調整 */
function fitTableToScreen() {
  const wrap = document.querySelector(".wrap");
  const table = document.getElementById("timetable");
  if (!wrap || !table) return;

  table.classList.add("fit-target");
  table.style.transform = "none";

  const allRows = table.querySelectorAll("tr");
  if (allRows.length === 0) return;

  const thtd = table.querySelectorAll("th, td");
  const leftCells = table.querySelectorAll(".corner, .time-col, .lunch-time");

  let rowHeight = 50;
  let fontSize = 16;
  let leftWidth = 80;
  let dayWidth = 120;

  const viewportH = window.innerHeight;
  const reserve = 16;
  const availableH = viewportH - reserve;

  const rowCount = allRows.length;

  rowHeight = Math.floor(availableH / rowCount);
  if (rowHeight > 50) rowHeight = 50;
  if (rowHeight < 28) rowHeight = 28;

  fontSize = Math.floor(rowHeight * 0.32);
  if (fontSize > 16) fontSize = 16;
  if (fontSize < 10) fontSize = 10;

  leftWidth = Math.max(48, Math.min(80, Math.floor(rowHeight * 1.5)));
  dayWidth = Math.max(68, Math.min(120, Math.floor(rowHeight * 2.4)));

  thtd.forEach(cell => {
    cell.style.height = rowHeight + "px";
    cell.style.fontSize = fontSize + "px";
    cell.style.lineHeight = "1.1";
  });

  leftCells.forEach(cell => {
    cell.style.width = leftWidth + "px";
    cell.style.minWidth = leftWidth + "px";
  });

  const allTableCells = table.querySelectorAll("th, td");
  allTableCells.forEach(cell => {
    const isLeft =
      cell.classList.contains("corner") ||
      cell.classList.contains("time-col") ||
      cell.classList.contains("lunch-time");

    const isMerged =
      cell.classList.contains("lunch-main") ||
      cell.classList.contains("lunch-merge");

    if (!isLeft && !isMerged) {
      cell.style.width = dayWidth + "px";
      cell.style.minWidth = dayWidth + "px";
    }
  });
}

/* リサイズ時にも再調整 */
window.addEventListener("resize", fitTableToScreen);
window.addEventListener("orientationchange", fitTableToScreen);
</script>

</body>
</html>
