<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

/* ★横スクロール */
.wrap {
  overflow-x: auto;
}

/* ★表 */
.grid {
  display: grid;
  grid-template-columns: 80px repeat(6, 120px);
}

/* セル */
.cell {
  border: 1px solid #ddd;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ★左列固定 */
.time {
  background: #eee;
  position: sticky;
  left: 0;
  z-index: 5;
}

/* ★曜日固定 */
.header {
  background: #f5f5f5;
  font-weight: bold;
  position: sticky;
  top: 0;
  z-index: 3;
}

/* 今日 */
.today {
  background: #ffe0b2;
  font-weight: bold;
}

/* 今の授業 */
.now {
  background: #ffccbc;
  font-weight: bold;
}

/* 昼休み */
.lunch-left {
  background: #eee;
  font-weight: bold;
  position: sticky;
  left: 0;
  z-index: 5;
}

.lunch {
  grid-column: 2 / 8;
  background: #fff9c4;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="grid" id="grid"></div>
</div>

<script>

const days = ["月","火","水","木","金","土"];

const times = [
  "8:30",
  "10:30",
  "12:50",
  "16:10",
  "17:50",
  "19:30"
];

const timetable = {
  "月": ["教職","","日本史","総合","",""],
  "火": ["教育","世界史","外書","","アジア史",""],
  "水": ["","地理","人文","","",""],
  "木": ["特別","地誌","史学展開","","日本時代","ICT"],
  "金": ["","","","","",""],
  "土": ["教育","","","","",""]
};

const grid = document.getElementById("grid");

const todayIndex = new Date().getDay();
const dayMap = ["日","月","火","水","木","金","土"];
const today = dayMap[todayIndex];

/* =====================
ヘッダー
===================== */
grid.appendChild(make("cell time header",""));

days.forEach(d => {
  const c = make("cell header", d);
  if (d === today) c.classList.add("today");
  grid.appendChild(c);
});

/* =====================
行生成
===================== */

for (let i = 0; i < times.length; i++) {

  // ★昼休み行
  if (i === 2) {

    grid.appendChild(make("cell lunch-left", "昼休み"));

    const lunch = make("cell lunch", "12:50〜14:30");
    grid.appendChild(lunch);

    continue;
  }

  // 時間
  grid.appendChild(make("cell time", times[i]));

  // 授業
  days.forEach(d => {
    const c = make("cell", timetable[d][i]);

    if (d === today) c.classList.add("today");

    grid.appendChild(c);
  });
}

function make(cls, text){
  const div = document.createElement("div");
  div.className = cls;
  div.innerText = text;
  return div;
}

</script>

</body>
</html>
