<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

.wrap {
  overflow-x: auto;
}

table {
  border-collapse: collapse;
  table-layout: fixed;
  min-width: 800px;
  background: #fff;
}

th, td {
  border: 1px solid #ccc;
  width: 120px;
  height: 50px;
  text-align: center;
  vertical-align: middle;
  padding: 0;
  box-sizing: border-box;
}

.corner {
  width: 80px;
  min-width: 80px;
  background: #eee;
  position: sticky;
  left: 0;
  z-index: 4;
}

.time-col {
  width: 80px;
  min-width: 80px;
  background: #eee;
  position: sticky;
  left: 0;
  z-index: 3;
}

.day-head {
  background: #f5f5f5;
  font-weight: bold;
  position: sticky;
  top: 0;
  z-index: 2;
}

.today {
  background: #ffe0b2;
}

.now {
  background: #ffccbc;
  box-shadow: inset 0 0 0 2px #ff5722;
  font-weight: bold;
}

.lunch-time {
  width: 80px;
  min-width: 80px;
  background: #eee;
  position: sticky;
  left: 0;
  z-index: 3;
  font-weight: bold;
}

.lunch-main {
  background: #fff9c4;
  font-weight: bold;
}

.lunch-merge {
  background: #ffffff;
}
</style>
</head>

<body>

<div class="wrap">
  <table id="timetable"></table>
</div>

<script>
const days = ["月","火","水","木","金","土"];

const rows = [
  { type: "class", time: "8:30",  key: 0 },
  { type: "class", time: "10:30", key: 1 },
  { type: "class", time: "12:50", key: 2 },
  { type: "lunch", time: "昼休み", label: "12:50〜14:30" },
  { type: "class", time: "16:10", key: 3 },
  { type: "class", time: "17:50", key: 4 },
  { type: "class", time: "19:30", key: 5 }
];

const timetable = {
  "月": ["教職", "", "日本史", "総合", "", ""],
  "火": ["教育", "世界史", "外書", "", "アジア史", ""],
  "水": ["", "地理", "人文", "", "", ""],
  "木": ["特別", "地誌", "史学展開", "", "日本時代", "ICT教育"],
  "金": ["", "", "", "", "", ""],
  "土": ["教育", "", "", "", "", ""]
};

const todayIndex = new Date().getDay();
const dayMap = ["日","月","火","水","木","金","土"];
const today = dayMap[todayIndex];

/* 日曜なら -1 になるので 0 にして崩れ防止 */
const todayIndexInWeek = Math.max(0, days.indexOf(today));

function getCurrentClassIndex() {
  const now = new Date();
  const minutes = now.getHours() * 60 + now.getMinutes();

  const ranges = [
    [8 * 60 + 30, 10 * 60 + 29],
    [10 * 60 + 30, 12 * 60 + 29],
    [12 * 60 + 50, 14 * 60 + 29],
    [16 * 60 + 10, 17 * 60 + 49],
    [17 * 60 + 50, 19 * 60 + 29],
    [19 * 60 + 30, 21 * 60 + 0]
  ];

  for (let i = 0; i < ranges.length; i++) {
    if (minutes >= ranges[i][0] && minutes <= ranges[i][1]) {
      return i;
    }
  }
  return -1;
}

const nowIndex = getCurrentClassIndex();
const table = document.getElementById("timetable");

/* ヘッダー */
const headerTr = document.createElement("tr");

const corner = document.createElement("th");
corner.className = "corner";
corner.textContent = "";
headerTr.appendChild(corner);

days.forEach(day => {
  const th = document.createElement("th");
  th.className = "day-head";
  if (day === today) th.classList.add("today");
  th.textContent = day;
  headerTr.appendChild(th);
});

table.appendChild(headerTr);

/* 本体 */
rows.forEach(row => {
  const tr = document.createElement("tr");

  if (row.type === "lunch") {
    const th = document.createElement("th");
    th.className = "lunch-time";
    th.textContent = row.time;
    tr.appendChild(th);

    // 今日より前は空白
    for (let i = 0; i < todayIndexInWeek; i++) {
      const empty = document.createElement("td");
      empty.textContent = "";
      tr.appendChild(empty);
    }

    // 今日の曜日のセル
    const main = document.createElement("td");
    main.className = "lunch-main";
    main.textContent = row.label;
    tr.appendChild(main);

    // 今日より後を結合
    const remain = 5 - todayIndexInWeek;
    if (remain > 0) {
      const merged = document.createElement("td");
      merged.className = "lunch-merge";
      merged.colSpan = remain;
      merged.textContent = "";
      tr.appendChild(merged);
    }

    table.appendChild(tr);
    return;
  }

  const th = document.createElement("th");
  th.className = "time-col";
  th.textContent = row.time;
  tr.appendChild(th);

  days.forEach(day => {
    const td = document.createElement("td");
    td.textContent = timetable[day][row.key] || "";

    if (day === today) td.classList.add("today");
    if (day === today && row.key === nowIndex) td.classList.add("now");

    tr.appendChild(td);
  });

  table.appendChild(tr);
});
</script>

</body>
</html>
